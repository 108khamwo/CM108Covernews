<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Cover Generator V2 - CM108</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        prompt: ['Prompt', 'sans-serif'],
                    },
                    colors: {
                        newsBlue: '#00c0fa',
                        newsDark: '#0f172a'
                    }
                }
            }
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .canvas-bg {
            background-color: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
            cursor: pointer;
            height: 28px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #00c0fa;
            border: 2px solid white;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
            margin-top: -6px;
        }

        input[type=number]::-webkit-inner-spin-button { display: none; }

        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .menu-section-title {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 font-prompt min-h-screen flex flex-col overflow-hidden">

    <header class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center shadow-sm z-50">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-newsBlue flex items-center justify-center rounded-lg shadow-lg shadow-blue-500/20">
                <i class="ph-bold ph-layout text-white text-lg"></i>
            </div>
            <h1 class="text-lg font-bold uppercase tracking-tight">News Cover <span class="text-newsBlue font-black">CM108</span></h1>
        </div>
        
        <div class="flex items-center gap-3">
            <button id="undo-btn" onclick="undo()" class="p-2 rounded-xl border border-slate-200 hover:bg-slate-50 text-slate-400 disabled:opacity-30 transition" title="ย้อนกลับ">
                <i class="ph-bold ph-arrow-u-up-left text-xl"></i>
            </button>
            <div class="h-6 w-px bg-slate-200 mx-1"></div>
            <button onclick="exportImage()" class="bg-newsDark hover:bg-black text-white px-5 py-2 rounded-xl font-bold flex items-center gap-2 transition active:scale-95 shadow-md">
                <i class="ph-bold ph-download-simple"></i>
                <span>บันทึกรูปภาพ</span>
            </button>
        </div>
    </header>

    <main class="flex-grow flex flex-col lg:flex-row h-[calc(100vh-65px)]">
        
        <aside class="w-full lg:w-[420px] bg-white border-r border-slate-200 overflow-y-auto no-scrollbar flex flex-col shadow-inner relative z-10">
            
            <div class="p-5 border-b border-slate-100">
                <h3 class="menu-section-title"><i class="ph-bold ph-image"></i> 1. รูปภาพข่าวและกรอบ</h3>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <button type="button" onclick="document.getElementById('bg-upload').click()" class="flex flex-col items-center gap-1 bg-blue-50 border border-blue-100 p-3 rounded-xl hover:bg-blue-100 transition group">
                        <i class="ph-bold ph-plus-circle text-newsBlue text-xl group-hover:scale-110 transition"></i>
                        <span class="text-[12px] font-bold text-newsBlue">เปลี่ยนรูปข่าว</span>
                    </button>
                    <button type="button" onclick="document.getElementById('frame-upload').click()" class="flex flex-col items-center gap-1 bg-emerald-50 border border-emerald-100 p-3 rounded-xl hover:bg-emerald-100 transition group">
                        <i class="ph-bold ph-frame-corners text-emerald-500 text-xl group-hover:scale-110 transition"></i>
                        <span class="text-[12px] font-bold text-emerald-500">เปลี่ยนกรอบ</span>
                    </button>
                    <input type="file" id="bg-upload" accept="image/*" class="hidden">
                    <input type="file" id="frame-upload" accept="image/png, image/webp" class="hidden">
                </div>

                <div class="bg-slate-50 p-4 rounded-xl space-y-4">
                    <div class="flex items-center justify-between">
                        <span class="text-[11px] font-bold text-slate-500 uppercase tracking-tighter">ปรับตำแหน่งภาพ</span>
                        <button onclick="resetBG()" class="text-[10px] font-bold text-red-500 underline uppercase">รีเซ็ต</button>
                    </div>

                    <div class="space-y-1">
                        <div class="flex justify-between items-center">
                            <label class="text-[10px] font-bold text-slate-400 uppercase">ซูมภาพ</label>
                            <span id="bg-scale-val" class="text-[10px] font-bold text-newsBlue">1.0</span>
                        </div>
                        <input type="range" id="bg-scale" min="0.1" max="5" step="0.01" value="1" class="w-full">
                    </div>

                    <div class="space-y-1">
                        <div class="flex justify-between items-center">
                            <label class="text-[10px] font-bold text-slate-400 uppercase">เลื่อน ซ้าย-ขวา (X)</label>
                            <input type="number" id="bg-x-num" class="w-12 text-[10px] font-bold text-newsBlue bg-white border border-slate-200 rounded text-center outline-none">
                        </div>
                        <input type="range" id="bg-x" min="-1000" max="1000" step="1" value="0" class="w-full">
                    </div>

                    <div class="space-y-1">
                        <div class="flex justify-between items-center">
                            <label class="text-[10px] font-bold text-slate-400 uppercase">เลื่อน บน-ล่าง (Y)</label>
                            <input type="number" id="bg-y-num" class="w-12 text-[10px] font-bold text-newsBlue bg-white border border-slate-200 rounded text-center outline-none">
                        </div>
                        <input type="range" id="bg-y" min="-1000" max="1000" step="1" value="0" class="w-full">
                    </div>
                </div>
            </div>

            <div class="p-5 border-b border-slate-100">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="menu-section-title !mb-0"><i class="ph-bold ph-text-aa"></i> 2. ข้อความพาดหัว</h3>
                    <div class="flex items-center gap-2 bg-slate-100 px-2 py-1 rounded-lg">
                        <span class="text-[10px] font-bold text-slate-400 uppercase">ช่องไฟ:</span>
                        <input type="number" id="line-gap" value="8" class="w-8 bg-transparent text-center text-xs font-bold outline-none text-newsBlue">
                    </div>
                </div>
                <div id="lines-container" class="space-y-4">
                </div>
            </div>

            <div class="p-5">
                <h3 class="menu-section-title"><i class="ph-bold ph-calendar-blank"></i> 3. วันที่และตำแหน่งรวม</h3>
                <div class="space-y-4">
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-200">
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">ข้อความวันที่</label>
                        <input type="text" id="date-text" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-center focus:ring-2 focus:ring-newsBlue outline-none">
                    </div>
                    
                    <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
                        <div class="flex justify-between mb-1">
                            <label class="text-[10px] font-bold text-blue-500 uppercase">เลื่อนข้อความทั้งหมด ขึ้น-ลง</label>
                            <input type="number" id="text-y-num" value="-10" class="text-[10px] font-bold text-blue-600 bg-transparent text-right outline-none w-10">
                        </div>
                        <input type="range" id="text-y" min="-800" max="800" step="1" value="-10" class="w-full accent-blue-600">
                    </div>
                    
                    <button type="button" onclick="resetTextGlobal()" class="w-full py-2 text-[11px] font-bold text-slate-400 hover:text-red-500 border border-dashed border-slate-300 rounded-lg transition hover:border-red-300">
                        รีเซ็ตข้อความและวันที่ทั้งหมด
                    </button>
                </div>
            </div>

        </aside>

        <section id="preview-wrapper" class="flex-grow canvas-bg relative p-6 flex justify-center items-center overflow-hidden z-0">
            <div id="scale-container" class="shadow-[0_20px_50px_rgba(0,0,0,0.5)] bg-black relative">
                <div id="capture-area" style="width: 1080px; height: 1350px; transform-origin: top left;"></div>
            </div>

            <div id="loading-overlay" class="absolute inset-0 bg-white/95 backdrop-blur-sm z-[100] flex flex-col items-center justify-center hidden">
                <div class="w-14 h-14 border-4 border-slate-100 border-t-newsBlue rounded-full animate-spin"></div>
                <p class="mt-4 font-bold text-slate-700 uppercase tracking-tighter">กำลังบันทึกภาพ...</p>
            </div>
        </section>
    </main>

    <script>
        const defaultFrame = "https://wsrv.nl/?url=blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiOOtphYnEgsG_Q_5Ht_nM8h4hBJkTlJ0HvXwVOlixbfIkYC4y4NTIxcfl58PvyUi9Tj9azFCGGRCK3ysLAyX3yzXVHRmfbtsau733we6uQ3DE6csoMtWBMG2TNS2i-8aOtvIKTpzkCIyh3avLpViH74sW5SnwEZCkkToZeB4Q6VO-cxHafdputo5SmSxE/s16000/%E0%B8%81%E0%B8%A3%E0%B8%AD%E0%B8%9A%E0%B9%80%E0%B8%9B%E0%B8%A5%E0%B9%88%E0%B8%B2.png&output=png";

        function getThaiToday() {
            const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            const d = new Date();
            const day = d.getDate();
            const month = months[d.getMonth()];
            const year = d.getFullYear() + 543;
            return `- ${day} ${month} ${year} -`;
        }

        let state = {
            lines: [
                { text: 'ประกันสังคม คว้ารางวัล', color: '#4bfafc', bgColor: 'transparent', size: 97, align: 'center', shadow: true, shadowOffset: 3, stroke: 6, yOffset: 25 },
                { text: 'สุดยอดหน่วยงานภาครัฐ', color: '#ffffff', bgColor: '#0bc8fa', size: 91, align: 'center', shadow: true, shadowOffset: 3, stroke: 6, yOffset: 0 },
                { text: 'จากเวที LINE THAILAND AWARDS 2025', color: '#ff9012', bgColor: 'transparent', size: 53, align: 'center', shadow: true, shadowOffset: 0, stroke: 0, yOffset: 0 }
            ],
            bg: { src: 'https://images.unsplash.com/photo-1555848962-6e79363ec58f?q=80&w=1080&auto=format&fit=crop', scale: 1, x: 0, y: 0, blur: false },
            frame: { src: defaultFrame },
            textPos: { y: -10 },
            gap: 8,
            date: { text: getThaiToday() }
        };

        let historyStack = [];
        const defaultColors = [
            { hex: '#4bfafc' }, { hex: '#0bc8fa' }, { hex: '#ffffff' }, 
            { hex: '#ff9012' }, { hex: '#f59e0b' }, { hex: '#000000' }
        ];

        function saveToHistory() {
            historyStack.push(JSON.parse(JSON.stringify(state)));
            if (historyStack.length > 30) historyStack.shift();
            updateUndoButton();
        }

        function undo() {
            if (historyStack.length === 0) return;
            state = historyStack.pop();
            renderAll();
            syncInputs();
            renderControls();
            updateUndoButton();
        }

        function updateUndoButton() {
            const btn = document.getElementById('undo-btn');
            if (btn) btn.disabled = historyStack.length === 0;
        }

        function updateLine(idx, key, val) {
            // ไม่ต้อง Auto-save ใน function นี้อีกต่อไป เพราะจัดการตอน mousedown/focus ที่ตัว input แล้ว
            state.lines[idx][key] = val;
            
            if (['size', 'yOffset', 'stroke', 'shadowOffset'].includes(key)) {
                const rangeInput = document.getElementById(`range-${key}-${idx}`);
                const numInput = document.getElementById(`num-${key}-${idx}`);
                if (rangeInput) rangeInput.value = val;
                if (numInput) numInput.value = val;
            }
            
            renderAll();
            
            // Re-render controls เฉพาะกรณีที่เป็นปุ่มกด (ไม่ต้อง re-render ถ้าเป็น slider/text)
            if (['align', 'shadow', 'color', 'bgColor'].includes(key)) {
                renderControls(); 
            }
        }

        function resetBG() {
            saveToHistory();
            state.bg.scale = 1; state.bg.x = 0; state.bg.y = 0;
            syncInputs(); renderAll();
        }

        function resetLine(idx) {
            saveToHistory();
            const defConfigs = [
                { color: '#4bfafc', bgColor: 'transparent', size: 97, align: 'center', shadow: true, shadowOffset: 3, stroke: 6, yOffset: 25 },
                { color: '#ffffff', bgColor: '#0bc8fa', size: 91, align: 'center', shadow: true, shadowOffset: 3, stroke: 6, yOffset: 0 },
                { color: '#ff9012', bgColor: 'transparent', size: 53, align: 'center', shadow: true, shadowOffset: 0, stroke: 0, yOffset: 0 }
            ];
            const currentText = state.lines[idx].text;
            state.lines[idx] = { ...defConfigs[idx], text: currentText };
            renderAll();
            renderControls();
        }

        function resetTextGlobal() {
            saveToHistory();
            state.textPos.y = -10;
            state.gap = 8;
            state.date.text = getThaiToday();
            syncInputs();
            renderAll();
        }

        function generateArtworkHTML(isExport = false, exportUnifiedBgSrc = null) {
            let linesHTML = '';
            
            state.lines.forEach((line, idx) => {
                if (!line.text.trim()) return;
                
                const padding = line.bgColor !== 'transparent' ? 'padding: 22px 30px 16px 30px;' : 'padding: 0;';
                const radius = line.bgColor !== 'transparent' ? 'border-radius: 16px;' : '';
                
                let shadowParts = [];
                
                if (line.stroke > 0) {
                    for (let r = 1; r <= line.stroke; r++) {
                        for (let a = 0; a < 360; a += 15) {
                            let rad = a * Math.PI / 180;
                            let dx = (Math.cos(rad) * r).toFixed(1);
                            let dy = (Math.sin(rad) * r).toFixed(1);
                            shadowParts.push(`${dx}px ${dy}px 0px black`);
                        }
                    }
                }
                
                if (line.shadow && line.shadowOffset > 0) {
                    for (let d = 0.5; d <= line.shadowOffset; d += 0.5) {
                        shadowParts.push(`${d}px ${d}px 0px rgba(0,0,0,1)`); 
                        if (line.stroke > 0) {
                            for (let r = 1; r <= line.stroke; r++) {
                                for (let a = 0; a < 360; a += 30) { 
                                    let rad = a * Math.PI / 180;
                                    let dx = (Math.cos(rad) * r + d).toFixed(1);
                                    let dy = (Math.sin(rad) * r + d).toFixed(1);
                                    shadowParts.push(`${dx}px ${dy}px 0px rgba(0,0,0,1)`);
                                }
                            }
                        }
                    }
                }

                const finalShadowStyle = shadowParts.length > 0 ? `text-shadow: ${shadowParts.join(', ')};` : '';

                let justify = 'flex-start';
                if (line.align === 'center') justify = 'center';
                if (line.align === 'right') justify = 'flex-end';

                linesHTML += `
                    <div style="display: flex; justify-content: ${justify}; width: 100%; transform: translateY(${line.yOffset}px);">
                        <div class="highlight-box-export-fix" style="background-color: ${line.bgColor}; ${radius} ${padding} box-sizing: border-box;">
                            <span style="color: ${line.color}; font-size: ${line.size}px; font-weight: 700; line-height: 1.15; display: block; white-space: pre-wrap; ${finalShadowStyle}">${line.text}</span>
                        </div>
                    </div>
                `;
            });

            const textGroupHTML = `
                <div id="headlines-export-wrapper" style="position: absolute; bottom: 280px; left: 0; width: 1080px; display: flex; flex-direction: column; align-items: center; z-index: 20; transform: translateY(${state.textPos.y}px);">
                    <div style="display: flex; flex-direction: column; width: 1040px; gap: ${parseInt(state.gap) + 20}px;">
                        ${linesHTML}
                    </div>
                    <div id="date-container-export" style="margin-top: 15px; display: flex; justify-content: center;">
                        <span id="date-text-export-span" style="color: white; font-size: 34px; font-weight: 600; text-shadow: 0px 2px 5px rgba(0,0,0,0.8); line-height: 1.2;">${state.date.text}</span>
                    </div>
                </div>
            `;

            const frameLayerHTML = `
                <img src="${state.frame.src}" style="position: absolute; top: 0; left: 0; width: 1080px; height: 1350px; z-index: 30; pointer-events: none; object-fit: contain;" crossorigin="anonymous">
            `;

            const blurValPreview = 15; 
            let blurLayerHTML = '';
            let fgContainerHTML = '';

            if (state.bg.blur) {
                if (isExport && exportUnifiedBgSrc) {
                    blurLayerHTML = `<div style="position: absolute; top: 0; left: -1px; width: 1082px; height: 1352px; z-index: 1; background-color: #000;"><img src="${exportUnifiedBgSrc}" style="width: 100%; height: 100%; object-fit: cover; display: block;"></div>`;
                    fgContainerHTML = ``;
                } else {
                    blurLayerHTML = `<div style="position: absolute; top: -15%; left: -15%; width: 130%; height: 130%; z-index: 1; background-color: #000;"><img src="${state.bg.src}" crossorigin="anonymous" style="width: 100%; height: 100%; object-fit: cover; filter: blur(${blurValPreview}px) brightness(0.6); -webkit-filter: blur(${blurValPreview}px) brightness(0.6);"></div>`;
                    let fgImageStyle = `width: 1080px; height: auto; display: block; image-rendering: -webkit-optimize-contrast; transform: translate(${state.bg.x}px, ${state.bg.y}px) scale(${state.bg.scale}); box-shadow: 0 0 60px rgba(0,0,0,0.65); border: none !important; outline: none !important;`;
                    fgContainerHTML = `<div style="position: absolute; top: 0; left: 0; width: 1080px; height: 1350px; z-index: 2; display: flex; align-items: flex-start; justify-content: center; padding-top: 0px;"><img src="${state.bg.src}" style="${fgImageStyle}" crossorigin="anonymous"></div>`;
                }
            } else {
                let fgImageStyle = `width: 1080px; height: auto; display: block; image-rendering: -webkit-optimize-contrast; transform: translate(${state.bg.x}px, ${state.bg.y}px) scale(${state.bg.scale}); border: none !important; outline: none !important;`;
                fgContainerHTML = `<div style="position: absolute; top: 0; left: 0; width: 1080px; height: 1350px; z-index: 2; display: flex; align-items: flex-start; justify-content: center; padding-top: 0px;"><img src="${state.bg.src}" style="${fgImageStyle}" crossorigin=\"anonymous\"></div>`;
            }

            // คำนวณความสูงของเฟดสีดำ: หากไม่มีบรรทัดที่ 3 ให้ลดความสูงของเงาลงมา
            const hasLine3 = state.lines[2] && state.lines[2].text.trim() !== '';
            const gradientHeight = hasLine3 ? 740 : 640;

            return `
                <div style="width: 1080px; height: 1350px; position: relative; overflow: hidden; background-color: #000; box-sizing: border-box;">
                    ${blurLayerHTML}
                    ${fgContainerHTML}
                    <div style="position: absolute; bottom: 0px; left: 0px; right: 0px; height: ${gradientHeight}px; background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 80%, rgba(0,0,0,0.8) 88%, rgba(0,0,0,0.4) 94%, rgba(0,0,0,0.1) 98%, transparent 100%); z-index: 10; pointer-events: none;"></div>
                    ${textGroupHTML}
                    ${frameLayerHTML}
                </div>
            `;
        }

        let renderAnimationFrame = null;

        function renderAll() {
            if (renderAnimationFrame) {
                cancelAnimationFrame(renderAnimationFrame);
            }
            
            renderAnimationFrame = requestAnimationFrame(() => {
                const area = document.getElementById('capture-area');
                if (area) {
                    area.innerHTML = generateArtworkHTML(false, null);
                    
                    const hasLine3 = state.lines[2] && state.lines[2].text.trim() !== '';
                    const highlights = area.querySelectorAll('.highlight-box-export-fix');
                    
                    highlights.forEach((box, index) => {
                        let previewParentTop = 0;
                        if (!hasLine3 && (index === 0 || index === 1)) {
                            previewParentTop = -5; // ขยับขึ้น 5px ในพรีวิวถ้าไม่มีบรรทัดที่ 3
                        }
                        
                        if (previewParentTop !== 0) {
                            box.parentElement.style.position = 'relative';
                            box.parentElement.style.top = `${previewParentTop}px`;
                        }

                        if (box.style.backgroundColor !== 'transparent' && box.style.backgroundColor !== 'rgba(0, 0, 0, 0)') {
                            let offset = 5;
                            box.style.position = 'relative';
                            box.style.top = `${offset}px`;
                            const textSpan = box.querySelector('span');
                            if (textSpan) {
                                textSpan.style.position = 'relative';
                                textSpan.style.top = `${-offset}px`;
                            }
                        }
                    });
                }
                const scaleLbl = document.getElementById('bg-scale-val');
                if (scaleLbl) scaleLbl.innerText = parseFloat(state.bg.scale).toFixed(2);
            });
        }

        function renderControls() {
            const container = document.getElementById('lines-container');
            container.innerHTML = '';
            
            state.lines.forEach((line, idx) => {
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-200 rounded-xl p-3 shadow-sm hover:border-newsBlue/30 transition-all";
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">บรรทัดที่ ${idx+1}</span>
                        <div class="flex gap-1">
                            <button onclick="saveToHistory(); updateLine(${idx}, 'align', 'left')" class="p-1.5 rounded ${line.align === 'left' ? 'bg-newsBlue text-white' : 'text-slate-400 hover:bg-slate-100'} transition"><i class="ph-bold ph-text-align-left text-sm"></i></button>
                            <button onclick="saveToHistory(); updateLine(${idx}, 'align', 'center')" class="p-1.5 rounded ${line.align === 'center' ? 'bg-newsBlue text-white' : 'text-slate-400 hover:bg-slate-100'} transition"><i class="ph-bold ph-text-align-center text-sm"></i></button>
                            <button onclick="resetLine(${idx})" class="p-1.5 text-slate-300 hover:text-red-500 transition"><i class="ph-bold ph-arrow-counter-clockwise text-sm"></i></button>
                        </div>
                    </div>
                    
                    <textarea onfocus="saveToHistory()" oninput="updateLine(${idx}, 'text', this.value)" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm font-bold focus:bg-white focus:ring-2 focus:ring-newsBlue outline-none transition-all resize-none font-prompt mb-3" rows="1" placeholder="พิมพ์ข้อความที่นี่...">${line.text}</textarea>
                    
                    <div class="space-y-3">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <div class="flex justify-between items-center mb-1"><label class="text-[10px] font-bold text-slate-400 uppercase">ขนาด:</label><input type="number" id="num-size-${idx}" min="30" max="250" value="${line.size}" onfocus="saveToHistory()" oninput="updateLine(${idx}, 'size', parseInt(this.value) || 30)" class="w-10 text-[10px] font-bold text-newsBlue bg-slate-100 rounded text-center outline-none"></div>
                                <input type="range" id="range-size-${idx}" min="30" max="250" value="${line.size}" onmousedown="saveToHistory()" ontouchstart="saveToHistory()" oninput="updateLine(${idx}, 'size', parseInt(this.value))" class="w-full">
                            </div>
                            <div>
                                <div class="flex justify-between items-center mb-1"><label class="text-[10px] font-bold text-slate-400 uppercase">ขยับ Y:</label><input type="number" id="num-yOffset-${idx}" min="-150" max="150" value="${line.yOffset}" onfocus="saveToHistory()" oninput="updateLine(${idx}, 'yOffset', parseInt(this.value) || 0)" class="w-10 text-[10px] font-bold text-emerald-500 bg-slate-100 rounded text-center outline-none"></div>
                                <input type="range" id="range-yOffset-${idx}" min="-150" max="150" value="${line.yOffset}" onmousedown="saveToHistory()" ontouchstart="saveToHistory()" oninput="updateLine(${idx}, 'yOffset', parseInt(this.value))" class="w-full accent-emerald-500">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <div class="flex justify-between items-center mb-1"><label class="text-[10px] font-bold text-slate-400 uppercase">ขอบดำ:</label><input type="number" id="num-stroke-${idx}" min="0" max="15" value="${line.stroke}" onfocus="saveToHistory()" oninput="updateLine(${idx}, 'stroke', parseInt(this.value) || 0)" class="w-10 text-[10px] font-bold text-black bg-slate-100 rounded text-center outline-none"></div>
                                <input type="range" id="range-stroke-${idx}" min="0" max="15" value="${line.stroke}" onmousedown="saveToHistory()" ontouchstart="saveToHistory()" oninput="updateLine(${idx}, 'stroke', parseInt(this.value))" class="w-full accent-black">
                            </div>
                            <div>
                                <div class="flex justify-between items-center mb-1"><label class="text-[10px] font-bold text-slate-400 uppercase">ระยะเงา:</label><input type="number" id="num-shadowOffset-${idx}" min="0" max="20" value="${line.shadowOffset}" onfocus="saveToHistory()" oninput="updateLine(${idx}, 'shadowOffset', parseInt(this.value) || 0)" class="w-10 text-[10px] font-bold text-gray-600 bg-slate-100 rounded text-center outline-none"></div>
                                <input type="range" id="range-shadowOffset-${idx}" min="0" max="20" value="${line.shadowOffset}" onmousedown="saveToHistory()" ontouchstart="saveToHistory()" oninput="updateLine(${idx}, 'shadowOffset', parseInt(this.value))" class="w-full accent-gray-600">
                            </div>
                        </div>
                        
                        <div class="flex items-center justify-between pt-1">
                            <div class="flex gap-1 items-center">
                                <span class="text-[10px] font-bold text-slate-400 uppercase mr-1">สี:</span>
                                ${defaultColors.map(c => `<button onclick="saveToHistory(); updateLine(${idx}, 'color', '${c.hex}')" class="w-5 h-5 rounded-full border border-slate-200 shadow-xs" style="background-color: ${c.hex}; ${line.color === c.hex ? 'ring-2 ring-newsBlue ring-offset-1' : ''}"></button>`).join('')}
                                <input type="color" value="${line.color}" onfocus="saveToHistory()" onclick="saveToHistory()" oninput="updateLine(${idx}, 'color', this.value)" class="w-5 h-5 p-0 border-0 rounded-full cursor-pointer ml-1">
                            </div>
                            <div class="flex gap-1 items-center border-l border-slate-100 pl-3">
                                <span class="text-[10px] font-bold text-slate-400 uppercase mr-1">ไฮไลท์:</span>
                                <button onclick="saveToHistory(); updateLine(${idx}, 'bgColor', 'transparent')" class="w-5 h-5 rounded-full border border-slate-300 relative overflow-hidden" title="ไม่มี"><div class="absolute inset-0 bg-white"></div><div class="absolute inset-0 bg-red-500 w-[1px] rotate-45 left-1/2"></div></button>
                                <button onclick="saveToHistory(); updateLine(${idx}, 'bgColor', '#0bc8fa')" class="w-5 h-5 rounded-full bg-[#0bc8fa] ${line.bgColor === '#0bc8fa' ? 'ring-2 ring-newsBlue ring-offset-1' : ''}"></button>
                                <button onclick="saveToHistory(); updateLine(${idx}, 'bgColor', '#ffffff')" class="w-5 h-5 rounded-full bg-white border border-slate-200 ${line.bgColor === '#ffffff' ? 'ring-2 ring-newsBlue ring-offset-1' : ''}"></button>
                                <input type="color" value="${line.bgColor === 'transparent' ? '#ffffff' : line.bgColor}" onfocus="saveToHistory()" onclick="saveToHistory()" oninput="updateLine(${idx}, 'bgColor', this.value)" class="w-5 h-5 p-0 border-0 rounded-full cursor-pointer shadow-sm ml-1">
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function syncInputs() {
            document.getElementById('bg-scale').value = state.bg.scale;
            document.getElementById('bg-x').value = state.bg.x;
            document.getElementById('bg-y').value = state.bg.y;
            document.getElementById('bg-x-num').value = state.bg.x;
            document.getElementById('bg-y-num').value = state.bg.y;
            document.getElementById('text-y').value = state.textPos.y;
            document.getElementById('text-y-num').value = state.textPos.y;
            document.getElementById('line-gap').value = state.gap;
            document.getElementById('date-text').value = state.date.text;
        }

        function handleResize() {
            const wrapper = document.getElementById('preview-wrapper');
            const container = document.getElementById('scale-container');
            const artwork = document.getElementById('capture-area');
            const scale = Math.min((wrapper.clientWidth - 40) / 1080, (wrapper.clientHeight - 40) / 1350, 1);
            artwork.style.transform = `scale(${scale})`;
            container.style.width = `${1080 * scale}px`;
            container.style.height = `${1350 * scale}px`;
        }

        async function exportImage() {
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('hidden');
            try {
                let exportUnifiedBgSrc = null;
                if (state.bg.blur) {
                    exportUnifiedBgSrc = await new Promise((resolve) => {
                        const img = new Image();
                        if (!state.bg.src.startsWith('blob:') && !state.bg.src.startsWith('data:')) img.crossOrigin = "anonymous";
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            canvas.width = 1080; canvas.height = 1350;
                            const ctx = canvas.getContext('2d');
                            ctx.filter = 'blur(10px) brightness(0.6)';
                            const imgRatio = img.width / img.height;
                            const canvasRatio = canvas.width / canvas.height;
                            let bgDrawW = canvas.width; let bgDrawH = canvas.height;
                            if (imgRatio > canvasRatio) bgDrawW = canvas.height * imgRatio; else bgDrawH = canvas.width / imgRatio;
                            const bleed = 80; bgDrawW += bleed * 2; bgDrawH += bleed * 2;
                            ctx.drawImage(img, (canvas.width - bgDrawW) / 2, (canvas.height - bgDrawH) / 2, bgDrawW, bgDrawH);
                            ctx.filter = 'none';
                            
                            let fgW = 1080;
                            let fgH = img.height * (1080 / img.width);
                            const scale = parseFloat(state.bg.scale);
                            ctx.save();
                            ctx.translate((1080 / 2) + parseFloat(state.bg.x), (fgH / 2) * scale + parseFloat(state.bg.y));
                            ctx.scale(scale, scale);
                            ctx.shadowColor = 'rgba(0, 0, 0, 0.65)'; ctx.shadowBlur = 60;
                            ctx.drawImage(img, -img.width / 2, -img.height / 2, img.width, img.height);
                            ctx.restore();
                            resolve(canvas.toDataURL('image/jpeg', 0.9));
                        };
                        img.src = state.bg.src;
                    });
                }
                const exportContainer = document.createElement('div');
                exportContainer.style.position = 'fixed'; exportContainer.style.left = '-9999px'; exportContainer.style.top = '0';
                exportContainer.style.width = '1080px'; exportContainer.style.height = '1350px';
                exportContainer.innerHTML = generateArtworkHTML(true, exportUnifiedBgSrc);
                
                const hasLine3 = state.lines[2] && state.lines[2].text.trim() !== '';

                const highlightBoxes = exportContainer.querySelectorAll('.highlight-box-export-fix');
                highlightBoxes.forEach((box, index) => {
                    let parentTop = -15; // Default
                    if (index === 0) {
                        parentTop = -22; // เลื่อนลง 3px (จากเดิม -25)
                        if (!hasLine3) parentTop -= 15; // ขยับขึ้น 15px กรณีมีแค่บรรทัด 1 และ 2
                    } else if (index === 1) {
                        parentTop = -15; // Reset
                        if (!hasLine3) parentTop -= 15; // ขยับขึ้น 15px กรณีมีแค่บรรทัด 1 และ 2
                    } else if (index === 2) {
                        parentTop = -2;  // เลื่อนลง 3px (จากเดิม -5)
                    }
                    
                    box.parentElement.style.position = 'relative'; 
                    box.parentElement.style.top = parentTop + 'px';

                    if (box.style.backgroundColor !== 'transparent' && box.style.backgroundColor !== 'rgba(0, 0, 0, 0)') {
                        let bTop = 50; 
                        let tTop = -50;
                        if (index === 1) { 
                            bTop = 45; 
                            tTop = -50; 
                        } else if (index === 2) { 
                            bTop = 40; 
                            tTop = -40; 
                        }
                        box.style.position = 'relative'; 
                        box.style.top = bTop + 'px';
                        const textSpan = box.querySelector('span');
                        if (textSpan) { 
                            textSpan.style.position = 'relative'; 
                            textSpan.style.top = tTop + 'px'; 
                        }
                    }
                });

                const exportDateContainer = exportContainer.querySelector('#date-container-export');
                const exportDateSpan = exportContainer.querySelector('#date-text-export-span');
                if (exportDateContainer && exportDateSpan) {
                    exportDateContainer.style.marginTop = '0px'; 
                    exportDateContainer.style.position = 'relative';
                    exportDateContainer.style.top = '15px'; 
                    exportDateSpan.style.fontWeight = '600';
                    exportDateSpan.style.fontSize = '34px';
                }

                const exportHeadlinesWrapper = exportContainer.querySelector('#headlines-export-wrapper');
                if (exportHeadlinesWrapper) {
                    exportHeadlinesWrapper.style.bottom = '315px'; 
                }

                document.body.appendChild(exportContainer);
                await new Promise(r => setTimeout(r, 1000));
                const canvas = await html2canvas(exportContainer.firstElementChild, { scale: 1, useCORS: true, allowTaint: true, backgroundColor: '#000000', width: 1080, height: 1350 });
                document.body.removeChild(exportContainer);
                const link = document.createElement('a');
                link.download = `CM108_NewsCoverV2_${Date.now()}.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 1.0); link.click();
            } catch (err) { console.error(err); } finally { overlay.classList.add('hidden'); }
        }

        window.onload = () => {
            renderControls(); renderAll(); handleResize(); syncInputs();
            window.addEventListener('resize', handleResize);
            
            document.getElementById('bg-upload').addEventListener('change', function(e) {
                if (e.target.files && e.target.files[0]) {
                    const url = URL.createObjectURL(e.target.files[0]);
                    const img = new Image();
                    img.onload = function() {
                        saveToHistory();
                        state.bg.src = url;
                        const heightAtWidth1080 = 1080 * (img.height / img.width);
                        state.bg.scale = heightAtWidth1080 < 920 ? (920 / heightAtWidth1080).toFixed(2) : 1.0;
                        state.bg.x = 0; state.bg.y = 0;
                        renderAll(); syncInputs();
                    };
                    img.src = url;
                }
            });

            document.getElementById('frame-upload').addEventListener('change', function(e) { if (e.target.files && e.target.files[0]) { saveToHistory(); state.frame.src = URL.createObjectURL(e.target.files[0]); renderAll(); } });
            
            // ปรับปรุงการผูกเหตุการณ์ Save History ให้อยู่ก่อนการเปลี่ยนแปลงค่า
            ['bg-scale', 'bg-x', 'bg-y', 'bg-x-num', 'bg-y-num', 'text-y', 'text-y-num', 'line-gap'].forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;
                
                // ดักจับเหตุการณ์ก่อนค่าจะถูกแก้
                if (el.type === 'range') {
                    el.addEventListener('mousedown', saveToHistory);
                    el.addEventListener('touchstart', saveToHistory, {passive: true});
                } else if (el.type === 'number' || el.type === 'text') {
                    el.addEventListener('focus', saveToHistory);
                }

                el.oninput = (e) => {
                    let val = e.target.value;
                    if (id === 'bg-scale') {
                        state.bg.scale = val;
                    } else if (id === 'bg-x' || id === 'bg-x-num') {
                        state.bg.x = parseInt(val) || 0;
                        document.getElementById('bg-x').value = state.bg.x;
                        document.getElementById('bg-x-num').value = state.bg.x;
                    } else if (id === 'bg-y' || id === 'bg-y-num') {
                        state.bg.y = parseInt(val) || 0;
                        document.getElementById('bg-y').value = state.bg.y;
                        document.getElementById('bg-y-num').value = state.bg.y;
                    } else if (id === 'text-y' || id === 'text-y-num') { 
                        state.textPos.y = val; 
                        document.getElementById('text-y').value = val; 
                        document.getElementById('text-y-num').value = val; 
                    } else if (id === 'line-gap') {
                        state.gap = val;
                    }
                    renderAll();
                };
            });

            const dateTextEl = document.getElementById('date-text');
            if (dateTextEl) {
                dateTextEl.addEventListener('focus', saveToHistory);
                dateTextEl.oninput = (e) => { state.date.text = e.target.value; renderAll(); };
            }
            
            window.addEventListener('keydown', (e) => { if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); } });
        };
    </script>
</body>
</html>
