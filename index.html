<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบทำปกข่าว CM108 - Dashboard</title>
    
    <!-- Google Fonts: Prompt -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { prompt: ['Prompt', 'sans-serif'] },
                    colors: { newsBlue: '#00c0fa', newsDark: '#0f172a' }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-slate-50 font-prompt min-h-screen text-slate-800 flex flex-col items-center py-10 px-4 relative">

    <!-- Background Decoration -->
    <div class="fixed inset-0 z-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(#00c0fa 1px, transparent 1px); background-size: 30px 30px;"></div>

    <div class="max-w-4xl mx-auto w-full z-10 space-y-8 animate-fade-in-up mt-4 lg:mt-10">
        <!-- Header -->
        <div class="text-center space-y-3">
            <div class="w-20 h-20 bg-white rounded-2xl shadow-xl shadow-blue-500/10 flex items-center justify-center mx-auto mb-4 border border-slate-200">
                <i class="ph-fill ph-layout text-4xl text-newsBlue"></i>
            </div>
            <h1 class="text-3xl lg:text-4xl font-black text-newsDark tracking-tight">CM108 News Cover <span class="text-newsBlue">Dashboard</span></h1>
            <p class="text-slate-500 font-medium text-sm lg:text-base">เลือกระบบและเวอร์ชันที่คุณต้องการใช้งาน</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mt-10">
            <!-- Original Section -->
            <div class="bg-white rounded-3xl p-6 lg:p-8 border border-slate-200 shadow-sm hover:shadow-lg hover:border-blue-200 transition-all">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-12 h-12 rounded-xl bg-slate-100 flex items-center justify-center">
                        <i class="ph-bold ph-clock-counter-clockwise text-2xl text-slate-500"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-slate-800">ระบบ Original (คลาสสิค)</h2>
                        <p class="text-sm text-slate-500">รูปแบบดั้งเดิม ข่าวทั่วไป</p>
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- ลิงก์ไปยังไฟล์ 1.1 -->
                    <a href="1.1 Original Desktop.html" class="group block bg-slate-50 hover:bg-blue-50 p-5 rounded-2xl border border-slate-200 hover:border-newsBlue transition text-center shadow-sm">
                        <i class="ph-bold ph-desktop text-4xl text-slate-400 group-hover:text-newsBlue mb-3 block transition transform group-hover:scale-110"></i>
                        <span class="font-bold text-sm text-slate-700 group-hover:text-newsBlue transition">เวอร์ชัน Desktop</span>
                    </a>
                    <!-- ลิงก์ไปยังไฟล์ 1.2 -->
                    <a href="1.2 Original Mobile.html" class="group block bg-slate-50 hover:bg-blue-50 p-5 rounded-2xl border border-slate-200 hover:border-newsBlue transition text-center shadow-sm">
                        <i class="ph-bold ph-device-mobile text-4xl text-slate-400 group-hover:text-newsBlue mb-3 block transition transform group-hover:scale-110"></i>
                        <span class="font-bold text-sm text-slate-700 group-hover:text-newsBlue transition">เวอร์ชัน Mobile</span>
                    </a>
                </div>
            </div>

            <!-- New Gen Section -->
            <div class="bg-gradient-to-br from-newsDark to-slate-800 rounded-3xl p-6 lg:p-8 shadow-md hover:shadow-2xl hover:shadow-newsDark/30 transition-all">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-12 h-12 rounded-xl bg-white/10 flex items-center justify-center">
                        <i class="ph-bold ph-star text-2xl text-newsBlue"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-white">ระบบ NEW GEN</h2>
                        <p class="text-sm text-slate-300">ดีไซน์ทันสมัย มีโลโก้และแถบล่าง</p>
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- ลิงก์ไปยังไฟล์ 2.1 -->
                    <a href="2.1 NEW GEN Desktop.html" class="group block bg-white/5 hover:bg-newsBlue/20 p-5 rounded-2xl border border-white/10 hover:border-newsBlue transition text-center shadow-sm">
                        <i class="ph-bold ph-desktop text-4xl text-slate-300 group-hover:text-white mb-3 block transition transform group-hover:scale-110"></i>
                        <span class="font-bold text-sm text-slate-200 group-hover:text-white transition">เวอร์ชัน Desktop</span>
                    </a>
                    <!-- ลิงก์ไปยังไฟล์ 2.2 -->
                    <a href="2.2 NEW GEN Mobile.html" class="group block bg-white/5 hover:bg-newsBlue/20 p-5 rounded-2xl border border-white/10 hover:border-newsBlue transition text-center shadow-sm">
                        <i class="ph-bold ph-device-mobile text-4xl text-slate-300 group-hover:text-white mb-3 block transition transform group-hover:scale-110"></i>
                        <span class="font-bold text-sm text-slate-200 group-hover:text-white transition">เวอร์ชัน Mobile</span>
                    </a>
                </div>
            </div>
        </div>

        <!-- Download Blank Frame Button -->
        <div class="pt-8 flex justify-center border-t border-slate-200/60 pb-10">
            <a href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiOOtphYnEgsG_Q_5Ht_nM8h4hBJkTlJ0HvXwVOlixbfIkYC4y4NTIxcfl58PvyUi9Tj9azFCGGRCK3ysLAyX3yzXVHRmfbtsau733we6uQ3DE6csoMtWBMG2TNS2i-8aOtvIKTpzkCIyh3avLpViH74sW5SnwEZCkkToZeB4Q6VO-cxHafdputo5SmSxE/s1200/%E0%B8%81%E0%B8%A3%E0%B8%AD%E0%B8%9A%E0%B9%80%E0%B8%9B%E0%B8%A5%E0%B9%88%E0%B8%B2.png" target="_blank" download="CM108_Blank_Frame.png" class="flex items-center gap-2 bg-white border border-slate-200 text-slate-700 hover:text-newsBlue hover:border-newsBlue hover:bg-blue-50 px-8 py-3.5 rounded-2xl font-bold transition-all shadow-sm">
                <i class="ph-bold ph-download-simple text-xl"></i>
                ดาวน์โหลดภาพกรอบเปล่า (PNG)
            </a>
        </div>
    </div>

</body>
</html>
