<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสร้างรูปแจ้งปรับราคาน้ำมัน (แบบใหม่)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลดฟอนต์ Prompt เข้ามาใช้งาน (น้ำหนัก 600, 700 สำหรับ Bold) -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ดึงฟอนต์ Cloud สำหรับ UI */
        @font-face {
            font-family: 'Cloud';
            src: url('https://cdn.jsdelivr.net/gh/lazywasabi/thai-web-fonts@7/fonts/Cloud/Cloud-Light.woff2') format('woff2'),
                 url('https://rawcdn.githack.com/lazywasabi/thai-web-fonts/master/fonts/Cloud/Cloud-Light.ttf') format('truetype');
            font-weight: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Cloud';
            src: url('https://cdn.jsdelivr.net/gh/lazywasabi/thai-web-fonts@7/fonts/Cloud/Cloud-Bold.woff2') format('woff2'),
                 url('https://rawcdn.githack.com/lazywasabi/thai-web-fonts/master/fonts/Cloud/Cloud-Bold.ttf') format('truetype');
            font-weight: bold;
            font-display: swap;
        }

        /* บังคับให้หน้าเว็บ UI ใช้ฟอนต์ Cloud ส่วน Canvas จะดึง Prompt ไปใช้ */
        body { font-family: 'Cloud', 'Kanit', sans-serif; }
        
        /* ซ่อนลูกศรใน input type number */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .fuel-card {
            transition: all 0.2s ease-in-out;
        }
        .fuel-card:focus-within {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-10">

    <!-- Header -->
    <div class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10">
        <h1 class="text-xl font-bold text-center" style="font-family: 'Cloud', sans-serif;">ระบบสร้างรูปแจ้งปรับราคาน้ำมัน (กรอบใหม่)</h1>
        <p class="text-center text-blue-200 text-xs mt-1" style="font-family: 'Prompt', sans-serif;">อัปเดตระบบ: กรอบใหม่ 960x1200px</p>
    </div>

    <div class="max-w-xl mx-auto mt-6 px-4">
        
        <!-- ส่วนกรอกข้อมูล -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 mb-6">
            
            <!-- ส่วนอัปโหลดรูปต้นฉบับ (ซ่อนไว้ใช้กรณีลิงก์พัง) -->
            <div class="hidden mb-6 bg-orange-50 p-4 rounded-lg border border-orange-200">
                <label class="block text-orange-800 font-bold mb-2">อัปโหลดภาพต้นฉบับ (หากภาพไม่ขึ้น)</label>
                <div class="text-xs text-gray-600 mb-2">ระบบพยายามดึงภาพอัตโนมัติ หากกดสร้างรูปไม่ได้ ให้อัปโหลดภาพต้นฉบับเองที่นี่ครับ</div>
                <input type="file" id="imageUpload" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange-600 file:text-white hover:file:bg-orange-700">
            </div>

            <!-- วันที่และเวลา -->
            <div class="mb-6">
                <label class="block text-gray-700 font-bold mb-2 text-lg" style="font-family: 'Prompt', sans-serif;">วันที่และเวลา (ข้อความด้านบน)</label>
                <input type="text" id="dateTimeText" value="มีผล 31 เมษายน 2569 เวลา 05.00 น." 
                    oninput="saveData()" style="font-family: 'Prompt', sans-serif;"
                    class="w-full bg-blue-50 border border-blue-200 text-blue-800 text-center font-bold rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <hr class="mb-6 border-gray-200">
            
            <!-- หัวข้อราคาน้ำมัน + ปุ่มดึงข้อมูล/ล้างข้อมูล -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3">
                <h2 class="text-gray-700 font-bold text-lg">กรอกราคาน้ำมัน (บาท/ลิตร)</h2>
                <div class="flex gap-2 w-full sm:w-auto">
                    <button type="button" onclick="clearAllData()" class="flex-1 sm:flex-none bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 text-xs font-bold py-2 px-3 rounded-lg transition-colors flex justify-center items-center gap-1 shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        ล้างค่า
                    </button>
                    <button type="button" id="fetchPriceBtn" onclick="fetchChiangMaiPrices()" class="flex-1 sm:flex-none bg-blue-100 hover:bg-blue-200 text-blue-700 text-xs font-bold py-2 px-3 rounded-lg transition-colors flex justify-center items-center gap-1 shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/></svg>
                        ดึงราคาปัจจุบัน
                    </button>
                </div>
            </div>

            <!-- รายการน้ำมัน -->
            <div id="fuelInputs" class="space-y-4">
                <!-- ข้อมูลจะถูกสร้างด้วย JavaScript -->
            </div>

            <!-- ปุ่มสร้างรูป -->
            <button type="button" id="generateBtn" onclick="generatePreview()" 
                class="w-full mt-8 bg-blue-600 hover:bg-blue-700 text-white font-bold text-lg py-4 px-6 rounded-xl shadow-lg transition duration-200 flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg> สร้างรูปภาพ / ดูตัวอย่าง
            </button>
        </div>

        <!-- ส่วนแสดงผลรูปภาพ (ซ่อนไว้ก่อน) -->
        <div id="previewSection" class="hidden bg-white rounded-2xl shadow-sm border border-gray-200 p-5 animate-[fadeIn_0.5s_ease-out]">
            <h2 class="text-gray-800 font-bold mb-4 text-lg text-center">ตัวอย่างรูปภาพ</h2>
            
            <div class="relative w-full rounded-lg overflow-hidden border-2 border-gray-300 shadow-inner bg-gray-100 flex justify-center">
                <!-- Canvas สำหรับวาดรูป -->
                <canvas id="canvas" class="max-w-full h-auto"></canvas>
            </div>

            <button type="button" onclick="downloadImage()" 
                class="w-full mt-6 bg-green-500 hover:bg-green-600 text-white font-bold text-lg py-4 px-6 rounded-xl shadow-lg transition duration-200 flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                บันทึกรูปภาพ (JPG)
            </button>
        </div>

    </div>

    <!-- Custom Modal -->
    <div id="customModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300" id="customModalContent">
            <h3 id="modalTitle" class="text-xl font-bold text-gray-800 mb-2" style="font-family: 'Cloud', sans-serif;">แจ้งเตือน</h3>
            <p id="modalMessage" class="text-gray-600 mb-6 text-sm"></p>
            <div id="modalButtons" class="flex justify-end gap-3"></div>
        </div>
    </div>

    <!-- โหลดรูปต้นฉบับใหม่ ซ่อนไว้ (แก้ปัญหา CORS ด้วย Proxy) -->
    <img id="baseImage" crossorigin="anonymous" 
         src="https://wsrv.nl/?url=img1.pic.in.th/images/-_Resized-1.jpg&q=100" 
         class="hidden"
         onload="console.log('โหลดภาพพื้นหลังสำเร็จ')"
         onerror="console.error('โหลดภาพพื้นหลังล้มเหลว')">

    <script>
        // --- 1. การตั้งค่าตำแหน่งแกน X (แนวนอน) สำหรับกรอบใหม่ ---
        // ปรับเป็นเปอร์เซ็นต์ของความกว้างภาพ (960px)
        const posX = {
            oldPrice: 0.400, // กล่องราคาเดิม (ซ้าย) - อยู่ตำแหน่งเดิม
            newPrice: 0.600, // กล่องส่วนต่าง (กลาง) - ขยับซ้าย 1 step (เดิม 0.610)
            diff:     0.800  // กล่องราคาใหม่ (ขวา) - ปรับตำแหน่งใหม่เป็น 0.800
        };

        // --- 2. การตั้งค่าข้อมูลชนิดน้ำมันและตำแหน่งแกน Y (แนวตั้ง) ---
        // ปรับเป็นเปอร์เซ็นต์ของความสูงภาพ (1200px) และเพิ่ม offsetY เพื่อชดเชยตำแหน่งเป็นพิกเซล (px)
        const fuels = [
            { id: 'diesel', name: 'ดีเซล', color: 'bg-blue-800', yPos: 0.245, offsetY: 66 }, // Y = 360px
            { id: 'e85', name: 'แก๊สโซฮอล์ E85', color: 'bg-red-600', yPos: 0.360, offsetY: 48 }, // Y = 480px
            { id: 'e20', name: 'แก๊สโซฮอล์ E20', color: 'bg-orange-500', yPos: 0.475, offsetY: 30 }, // Y = 600px
            { id: 'g95', name: 'แก๊สโซฮอล์ 95', color: 'bg-yellow-500', yPos: 0.590, offsetY: 12 }, // Y = 720px
            { id: 'g91', name: 'แก๊สโซฮอล์ 91', color: 'bg-teal-500', yPos: 0.705, offsetY: -6 }  // Y = 840px
        ];

        // สร้าง Input Fields อัตโนมัติ
        const fuelInputsContainer = document.getElementById('fuelInputs');
        
        fuels.forEach(fuel => {
            const card = document.createElement('div');
            card.className = `fuel-card bg-white border border-gray-200 rounded-xl p-4`;
            card.innerHTML = `
                <div class="flex items-center mb-3">
                    <div class="w-4 h-4 rounded-full ${fuel.color} mr-2"></div>
                    <span class="font-bold text-gray-800 text-lg">${fuel.name}</span>
                </div>
                <div class="grid grid-cols-[1fr_auto_1fr_1fr] gap-2 items-end">
                    <div>
                        <label class="block text-[10px] text-gray-500 mb-1 text-center font-bold">ราคาเดิม</label>
                        <input type="number" id="old_${fuel.id}" step="0.01" inputmode="decimal" placeholder="0.00"
                            class="w-full bg-gray-50 border border-gray-300 text-center font-bold text-gray-800 rounded-lg p-2 outline-none focus:ring-2 focus:ring-blue-500"
                            oninput="calculateDiff('${fuel.id}')"
                            onblur="formatPriceOnBlur('${fuel.id}', 'old')">
                    </div>
                    <div class="pb-1.5">
                        <button type="button" onclick="swapPrices('${fuel.id}')" class="p-1 hover:bg-gray-100 rounded-lg text-gray-400 transition-colors" title="สลับราคาเดิม-ราคาใหม่">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 8 4 4-4 4"/><path d="M2 12h20"/><path d="m6 8-4 4 4 4"/></svg>
                        </button>
                    </div>
                    <div>
                        <label class="block text-[10px] text-blue-500 mb-1 text-center font-bold">ราคาใหม่</label>
                        <input type="number" id="new_${fuel.id}" step="0.01" inputmode="decimal" placeholder="0.00"
                            class="w-full bg-blue-50 border border-blue-400 text-center font-bold text-blue-700 rounded-lg p-2 outline-none focus:ring-2 focus:ring-blue-500"
                            oninput="calculateDiff('${fuel.id}')"
                            onblur="formatPriceOnBlur('${fuel.id}', 'new')">
                    </div>
                    <div>
                        <label class="block text-[10px] text-gray-500 mb-1 text-center font-bold">ส่วนต่าง</label>
                        <input type="text" id="diff_${fuel.id}" placeholder="-"
                            class="w-full bg-gray-100 border border-gray-200 text-center font-bold rounded-lg p-2 outline-none"
                            oninput="handleDiffInput('${fuel.id}')"
                            onblur="formatDiffOnBlur('${fuel.id}')">
                    </div>
                </div>
            `;
            fuelInputsContainer.appendChild(card);
        });

        function setTomorrowDate() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1); 
            const thaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            const d = tomorrow.getDate();
            const m = thaiMonths[tomorrow.getMonth()];
            const y = tomorrow.getFullYear() + 543; 
            document.getElementById('dateTimeText').value = `มีผล ${d} ${m} ${y} เวลา 05.00 น.`;
        }

        async function fetchChiangMaiPrices() {
            const btn = document.getElementById('fetchPriceBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin h-4 w-4 mr-1 text-blue-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังดึงข้อมูล...`;
            btn.disabled = true;

            try {
                let response;
                const targetUrl = 'https://api.chnwt.dev/thai-oil-api/latest';
                
                try {
                    response = await fetch(targetUrl);
                } catch(e) {
                    response = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl));
                }
                
                if (!response.ok) throw new Error('ไม่สามารถเชื่อมต่อกับฐานข้อมูลน้ำมันได้');
                const data = await response.json();
                
                const ptt = data?.response?.stations?.ptt || data?.stations?.ptt || data?.ptt || {};
                const cmOffset = 0.7; // พื้นที่ อ.เมืองเชียงใหม่ (+0.7 บาท)

                const findStandardPrice = (keys) => {
                    for (let key of keys) {
                        let val = ptt[key];
                        if (val !== undefined && val !== null) {
                            let num = typeof val === 'object' && val.price !== undefined ? parseFloat(val.price) : parseFloat(val);
                            if (!isNaN(num)) return num + cmOffset;
                        }
                    }
                    return null;
                };

                const getStandardDieselPrice = () => {
                    return findStandardPrice(['premium_diesel', 'diesel', 'ดีเซล']);
                };

                const priceMap = {
                    'diesel': getStandardDieselPrice(),
                    'e85': findStandardPrice(['gasohol_e85', 'gasoholE85', 'e85', 'แก๊สโซฮอล์ E85']),
                    'e20': findStandardPrice(['gasohol_e20', 'gasoholE20', 'e20', 'แก๊สโซฮอล์ E20']),
                    'g95': findStandardPrice(['gasohol_95', 'gasohol95', 'e10_95', 'แก๊สโซฮอล์ 95']),
                    'g91': findStandardPrice(['gasohol_91', 'gasohol91', 'e10_91', 'แก๊สโซฮอล์ 91'])
                };

                let updatedCount = 0;
                fuels.forEach(fuel => {
                    let priceValue = priceMap[fuel.id];
                    if (priceValue !== null && priceValue !== undefined) {
                        document.getElementById(`old_${fuel.id}`).value = priceValue.toFixed(2);
                        calculateDiff(fuel.id, true);
                        updatedCount++;
                    }
                });
                
                saveData();
                if (updatedCount > 0) showModal('สำเร็จ', 'ดึงข้อมูลราคาน้ำมันปัจจุบัน (+0.7 บาท อ.เมืองเชียงใหม่) สำเร็จ!');
                else showModal('แจ้งเตือน', 'ดึงข้อมูลได้ แต่ไม่พบราคาน้ำมันมาตรฐานในฐานข้อมูล กรุณากรอกเองชั่วคราวครับ');

            } catch (error) {
                console.error('Fetch error:', error);
                showModal('ข้อผิดพลาด', 'ไม่สามารถดึงข้อมูลจากเซิร์ฟเวอร์ได้ในขณะนี้: ' + error.message + '\nกรุณากรอกราคาเดิมด้วยตนเองครับ');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // ระบบ Custom Modal
        function showModal(title, message, type = 'alert', onConfirm = null) {
            const modal = document.getElementById('customModal');
            const modalContent = document.getElementById('customModalContent');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMessage').innerText = message;
            
            const btnContainer = document.getElementById('modalButtons');
            if (type === 'confirm') {
                btnContainer.innerHTML = `
                    <button onclick="closeModal()" class="px-4 py-2 text-gray-600 font-bold bg-gray-100 hover:bg-gray-200 rounded-lg text-sm transition-colors">ยกเลิก</button>
                    <button id="confirmActionBtn" class="px-4 py-2 text-white font-bold bg-red-500 hover:bg-red-600 rounded-lg text-sm transition-colors">ยืนยันการล้าง</button>
                `;
                document.getElementById('confirmActionBtn').onclick = () => { closeModal(); if(onConfirm) onConfirm(); };
            } else {
                btnContainer.innerHTML = `<button onclick="closeModal()" class="px-4 py-2 text-white font-bold bg-blue-600 hover:bg-blue-700 rounded-lg text-sm transition-colors">ตกลง</button>`;
            }
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('customModal');
            const modalContent = document.getElementById('customModalContent');
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        function clearAllData() {
            showModal('ยืนยันการล้างข้อมูล', 'คุณต้องการลบตัวเลขทั้งหมดที่กรอกไว้ใช่หรือไม่?', 'confirm', () => {
                localStorage.removeItem('oilPriceData');
                fuels.forEach(fuel => {
                    document.getElementById(`old_${fuel.id}`).value = '';
                    document.getElementById(`new_${fuel.id}`).value = '';
                    document.getElementById(`diff_${fuel.id}`).value = '';
                    calculateDiff(fuel.id, true);
                });
                saveData();
                const previewSection = document.getElementById('previewSection');
                if (previewSection) previewSection.classList.add('hidden');
            });
        }

        function swapPrices(id) {
            const oldInput = document.getElementById(`old_${id}`);
            const newInput = document.getElementById(`new_${id}`);
            const temp = oldInput.value;
            oldInput.value = newInput.value;
            newInput.value = temp;
            
            if(oldInput.value) oldInput.value = parseFloat(oldInput.value).toFixed(2);
            if(newInput.value) newInput.value = parseFloat(newInput.value).toFixed(2);
            calculateDiff(id);
        }

        function formatPriceOnBlur(id, type) {
            const input = document.getElementById(`${type}_id`);
            // แก้ไข bug เดิมที่เรียกผิด id ให้ถูกต้อง
            const realInput = document.getElementById(`${type}_${id}`);
            let val = parseFloat(realInput.value);
            if (!isNaN(val)) realInput.value = val.toFixed(2);
            calculateDiff(id);
        }

        function formatDiffOnBlur(id) {
            const diffInput = document.getElementById(`diff_${id}`);
            let val = diffInput.value;
            let cleanVal = val.replace(/[^\d.-]/g, '');
            if (cleanVal === "" || isNaN(parseFloat(cleanVal))) {
                diffInput.value = "-";
                diffInput.className = "w-full bg-gray-100 border border-gray-200 text-center font-bold rounded-lg p-2 outline-none";
                return;
            }
            let num = parseFloat(cleanVal);
            if (num === 0) {
                diffInput.value = "-";
                diffInput.className = "w-full bg-gray-100 border border-gray-200 text-center font-bold rounded-lg p-2 outline-none";
            } else {
                const prefix = num > 0 ? "+" : "";
                diffInput.value = prefix + num.toFixed(2);
            }
        }

        function handleDiffInput(id) {
            const diffInput = document.getElementById(`diff_${id}`);
            const oldVal = parseFloat(document.getElementById(`old_${id}`).value);
            const newVal = parseFloat(document.getElementById(`new_${id}`).value);
            let val = diffInput.value;
            if (val !== "" && /^[0-9.]/.test(val)) { diffInput.value = "+" + val; val = "+" + val; }
            let cleanVal = val.replace(/[^\d.-]/g, '');
            if (cleanVal === "" || cleanVal === "-" || cleanVal === "+") {
                diffInput.className = "w-full bg-gray-100 border border-gray-200 text-center font-bold rounded-lg p-2 outline-none";
                return;
            }
            let diffNum = parseFloat(cleanVal);
            if (!isNaN(diffNum)) {
                if (!isNaN(oldVal)) {
                    document.getElementById(`new_${id}`).value = (oldVal + diffNum).toFixed(2);
                } else if (!isNaN(newVal)) {
                    document.getElementById(`old_${id}`).value = (newVal - diffNum).toFixed(2);
                }
                if (diffNum > 0) diffInput.className = "w-full bg-red-50 border border-red-300 text-center font-bold text-red-600 rounded-lg p-2 outline-none";
                else if (diffNum < 0) diffInput.className = "w-full bg-green-50 border border-green-300 text-center font-bold text-green-500 rounded-lg p-2 outline-none";
                else diffInput.className = "w-full bg-gray-100 border border-gray-300 text-center font-bold text-gray-600 rounded-lg p-2 outline-none";
            }
            saveData();
        }

        function calculateDiff(id, skipSave = false) {
            const oldVal = parseFloat(document.getElementById(`old_${id}`).value);
            const newVal = parseFloat(document.getElementById(`new_${id}`).value);
            const diffInput = document.getElementById(`diff_${id}`);

            if (!isNaN(oldVal) && !isNaN(newVal)) {
                const diff = newVal - oldVal;
                let formattedDiff = Math.abs(diff).toFixed(2); 
                if (diff > 0) {
                    diffInput.value = "+\u200A" + formattedDiff;
                    diffInput.className = "w-full bg-red-50 border border-red-300 text-center font-bold text-red-600 rounded-lg p-2 outline-none";
                } else if (diff < 0) {
                    diffInput.value = "-\u200A" + formattedDiff;
                    diffInput.className = "w-full bg-green-50 border border-green-300 text-center font-bold text-green-500 rounded-lg p-2 outline-none";
                } else {
                    diffInput.value = "-"; 
                    diffInput.className = "w-full bg-gray-100 border border-gray-300 text-center font-bold text-gray-600 rounded-lg p-2 outline-none";
                }
            } else {
                diffInput.value = "";
                diffInput.className = "w-full bg-gray-100 border border-gray-200 text-center font-bold rounded-lg p-2 outline-none";
            }
            if (!skipSave) saveData(); 
        }

        function saveData() {
            const data = { fuels: {} };
            fuels.forEach(fuel => {
                data.fuels[fuel.id] = {
                    old: document.getElementById(`old_${fuel.id}`).value,
                    new: document.getElementById(`new_${fuel.id}`).value
                };
            });
            localStorage.setItem('oilPriceData', JSON.stringify(data));
        }

        function loadData() {
            try {
                const saved = localStorage.getItem('oilPriceData');
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.fuels) {
                        fuels.forEach(fuel => {
                            if (data.fuels[fuel.id]) {
                                document.getElementById(`old_${fuel.id}`).value = data.fuels[fuel.id].old || '';
                                document.getElementById(`new_${fuel.id}`).value = data.fuels[fuel.id].new || '';
                                calculateDiff(fuel.id, true); 
                            }
                        });
                    }
                }
            } catch (e) { console.warn('Error loading data', e); }
        }

        function setupEnterNavigation() {
            const inputs = Array.from(document.querySelectorAll('input[type="text"]:not([readonly]), input[type="number"]'));
            inputs.forEach((input, index) => {
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault(); 
                        const nextInput = inputs[index + 1];
                        if (nextInput) { nextInput.focus(); nextInput.select(); }
                        else { if (!document.getElementById('generateBtn').disabled) generatePreview(); }
                    }
                });
            });
        }

        // --- ส่วนการสร้างรูปลง Canvas ---
        async function generatePreview() {
            try {
                await document.fonts.ready; // รอให้ฟอนต์ Prompt โหลดเสร็จก่อน
                const baseImg = document.getElementById('baseImage');
                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d');
                
                if (!baseImg.complete || baseImg.naturalWidth === 0) { 
                    showModal('แจ้งเตือน', 'ภาพต้นฉบับ (กรอบ) ยังโหลดไม่สำเร็จ \nโปรดรอสักครู่ เช็คอินเทอร์เน็ต หรือใช้วิธี "อัปโหลดภาพต้นฉบับ" แทนครับ'); 
                    return; 
                }

                // บังคับขนาดตามรูปต้นฉบับ (960 x 1200) เพื่อความคมชัด 100%
                const width = baseImg.naturalWidth;
                const height = baseImg.naturalHeight;
                canvas.width = width;
                canvas.height = height;
                
                // วาดพื้นหลัง
                ctx.drawImage(baseImg, 0, 0, width, height);

                // --- ตัวแปรสำหรับปรับตั้งค่า (อ้างอิงจากขนาดภาพ) ---
                // เช็คว่าเป็นอุปกรณ์ iOS (iPhone, iPad) หรือไม่
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
                
                // ปรับชดเชยแกน Y: ถ้าเป็น iOS ขยับตัวหนังสือ/ตัวเลขขึ้น 5px (ใส่ 5), ถ้าเป็นคอมพิวเตอร์ให้อยู่ที่เดิม (0)
                const iosVerticalOffset = isIOS ? 5 : 0; 

                // 1. วาดวันที่
                const dateText = document.getElementById('dateTimeText').value;
                const dateY = (height * 0.130) - iosVerticalOffset; 
                const dateX = width * 0.560; // ขยับขวานิดหน่อยหลบโลโก้
                
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                // บังคับฟอนต์ Prompt Bold เท่านั้น และลดขนาดลง -2px ตามคำสั่ง
                ctx.font = `bold ${(width * 0.045) - 2}px "Prompt", sans-serif`; 
                ctx.fillStyle = "#ffffff"; // สีขาวตามตัวอย่าง
                // เงาข้อความวันที่
                ctx.shadowColor = "rgba(0, 0, 0, 0.4)";
                ctx.shadowBlur = 6;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2; 
                ctx.fillText(dateText, dateX, dateY);
                
                // ปิดเงาก่อนวาดราคาน้ำมัน
                ctx.shadowColor = "transparent";
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;

                // 2. ตำแหน่งแกน X ของคอลัมน์ต่างๆ (แก้ไข: สลับตำแหน่งส่วนต่างมาอยู่ตรงกลาง)
                const colOldX = width * posX.oldPrice;   // ราคาเดิม (ซ้าย)
                const colDiffX = width * posX.newPrice;  // ส่วนต่าง (กลาง) - ใช้ตำแหน่งเดิมของราคาใหม่
                const colNewX = width * posX.diff;       // ราคาใหม่ (ขวา) - ใช้ตำแหน่งเดิมของส่วนต่าง
                
                // ขนาดฟอนต์สำหรับตัวเลขราคาน้ำมัน ลดขนาดลง -20px ตามคำสั่ง
                const priceFontSize = (width * 0.082) - 20; 

                // ลูปวาดข้อมูลน้ำมันแต่ละชนิด
                fuels.forEach(fuel => {
                    const oldVal = document.getElementById(`old_${fuel.id}`).value;
                    const newVal = document.getElementById(`new_${fuel.id}`).value;
                    const diffVal = document.getElementById(`diff_${fuel.id}`).value;
                    const diffNum = parseFloat(diffVal.replace(/[+\u200A]/g, '').trim());
                    
                    const yPos = (height * fuel.yPos) - iosVerticalOffset + (fuel.offsetY || 0);

                    // ลดขนาดฟอนต์ถ้าตัวเลขยาว (เช่น ส่วนต่างเกิน 10 บาท)
                    let drawFontSize = priceFontSize;
                    if (!isNaN(diffNum) && Math.abs(diffNum) >= 10) {
                        drawFontSize = priceFontSize - 6; 
                    }

                    // คอลัมน์ ราคาเดิม (สีดำ) - อยู่ซ้ายสุดเหมือนเดิม
                    if(oldVal) {
                        ctx.font = `bold ${priceFontSize}px "Prompt", sans-serif`;
                        ctx.fillStyle = "#000000"; 
                        ctx.fillText(parseFloat(oldVal).toFixed(2), colOldX, yPos);
                    }
                    
                    // คอลัมน์ ส่วนต่าง (ตรงกลาง) - สีแดง/เขียว
                    if(diffVal && diffVal !== "-") {
                        ctx.font = `bold ${drawFontSize}px "Prompt", sans-serif`;
                        let cleanDisplay = diffVal.replace(/\u200A/g, ''); 
                        
                        if(cleanDisplay.includes('+')) {
                            ctx.fillStyle = "#e60000"; // สีแดงสำหรับขึ้นราคา
                        } else if (cleanDisplay.includes('-')) {
                            ctx.fillStyle = "#1b882e"; // สีเขียวสำหรับลงราคา
                        } else {
                            ctx.fillStyle = "#000000";
                        }
                        ctx.fillText(cleanDisplay, colDiffX, yPos); // วาดที่ตำแหน่งกลาง
                    } else if (diffVal === "-" || (oldVal && !diffVal)) {
                        ctx.font = `bold ${priceFontSize}px "Prompt", sans-serif`;
                        ctx.fillStyle = "#888888"; // สีเทาสำหรับไม่มีการเปลี่ยนแปลง
                        ctx.fillText("-", colDiffX, yPos); // วาดที่ตำแหน่งกลาง
                    }
                    
                    // คอลัมน์ ราคาใหม่ (สีขาว บนพื้นเขียว) - ย้ายไปขวาสุด
                    if(newVal) {
                        ctx.font = `bold ${priceFontSize}px "Prompt", sans-serif`;
                        ctx.fillStyle = "#ffffff"; 
                        
                        // เพิ่มเงาบางๆ ให้ตัวเลขราคาใหม่
                        ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
                        ctx.shadowBlur = 4;
                        ctx.shadowOffsetX = 2;
                        ctx.shadowOffsetY = 2;
                        
                        ctx.fillText(parseFloat(newVal).toFixed(2), colNewX, yPos); // วาดที่ตำแหน่งขวา
                        
                        // เคลียร์ค่าเงากลับเป็นปกติ ป้องกันไม่ให้กระทบลูปถัดไป
                        ctx.shadowColor = "transparent";
                        ctx.shadowBlur = 0;
                        ctx.shadowOffsetX = 0;
                        ctx.shadowOffsetY = 0;
                    } else if (oldVal) {
                        ctx.font = `bold ${priceFontSize}px "Prompt", sans-serif`;
                        ctx.fillStyle = "#ffffff"; 
                        
                        // เพิ่มเงาให้ขีด - เหมือนตัวเลขด้วย
                        ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
                        ctx.shadowBlur = 4;
                        ctx.shadowOffsetX = 2;
                        ctx.shadowOffsetY = 2;
                        
                        ctx.fillText("-", colNewX, yPos); // วาดขีดเมื่อเว้นช่องว่างไว้
                        
                        ctx.shadowColor = "transparent";
                        ctx.shadowBlur = 0;
                        ctx.shadowOffsetX = 0;
                        ctx.shadowOffsetY = 0;
                    }
                });

                const previewSection = document.getElementById('previewSection');
                previewSection.classList.remove('hidden');
                previewSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } catch (error) { 
                console.warn(error); 
                showModal("ข้อผิดพลาด", "เกิดข้อผิดพลาดในการสร้างรูปภาพ (โปรดรอฟอนต์หรือภาพโหลดสักครู่)"); 
            }
        }

        function downloadImage() {
            try {
                const canvas = document.getElementById('canvas');
                // บันทึกที่คุณภาพ 100% (1.0)
                const dataURL = canvas.toDataURL('image/jpeg', 1.0);
                const link = document.createElement('a');
                const dateStr = new Date().toISOString().slice(0,10);
                link.download = `oil-price-update-${dateStr}.jpg`;
                link.href = dataURL;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (error) { showModal("ข้อผิดพลาด", "เกิดข้อผิดพลาดในการบันทึกภาพ"); }
        }

        window.onload = () => {
            setTomorrowDate(); 
            loadData();             
            setupEnterNavigation(); 
            document.getElementById('imageUpload').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const baseImg = document.getElementById('baseImage');
                        baseImg.onload = function() { showModal('สำเร็จ', 'อัปโหลดภาพสำเร็จ!'); };
                        baseImg.removeAttribute('crossorigin'); 
                        baseImg.src = event.target.result;
                    }
                    reader.readAsDataURL(file);
                }
            });
        };
    </script>
</body>
