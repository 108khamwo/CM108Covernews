<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>News Cover Generator V2 - Mobile Friendly</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { prompt: ['Prompt', 'sans-serif'] },
                    colors: { newsBlue: '#00c0fa', newsDark: '#0f172a' }
                }
            }
        }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* Mobile Specific Styles */
        body {
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none; /* Prevent pull-to-refresh on mobile */
            -webkit-text-size-adjust: none; /* Fix for mobile font boosting */
            text-size-adjust: none;
        }
        
        /* แก้ปัญหาเบราว์เซอร์มือถือแอบขยายฟอนต์อัตโนมัติ (Font Boosting) ทำให้พรีวิวเพี้ยนเวลาพิมพ์ */
        #scale-container, #capture-area, #capture-area * {
            -webkit-text-size-adjust: none !important;
            text-size-adjust: none !important;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .canvas-bg {
            background-color: #e2e8f0;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 15px 15px;
        }

        /* Larger touch targets for mobile ranges */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
            width: 100%;
            height: 36px; /* Taller for touch */
            margin: 0;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 8px; cursor: pointer;
            background: #cbd5e1; border-radius: 4px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 24px; width: 24px; border-radius: 50%;
            background: #00c0fa; cursor: pointer;
            -webkit-appearance: none; margin-top: -8px;
            border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        input[type=range].accent-emerald-500::-webkit-slider-thumb { background: #10b981; }
        input[type=range].accent-black::-webkit-slider-thumb { background: #000000; }
        input[type=range].accent-gray-600::-webkit-slider-thumb { background: #4b5563; }
        input[type=range].accent-blue-600::-webkit-slider-thumb { background: #2563eb; }

        input[type=number]::-webkit-inner-spin-button { display: none; }
        
        /* Smooth tab transition */
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Hide advanced settings by default */
        .advanced-settings { display: none; overflow: hidden; }
        .advanced-settings.open { display: block; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-prompt h-[100dvh] flex flex-col overflow-hidden">

    <!-- Header (Fixed Top) -->
    <header class="bg-white border-b border-slate-200 px-4 py-2 flex justify-between items-center shadow-sm shrink-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-newsBlue flex items-center justify-center rounded-lg shadow-md">
                <i class="ph-bold ph-layout text-white text-base"></i>
            </div>
            <h1 class="text-base font-bold uppercase tracking-tight truncate max-w-[150px] sm:max-w-none">
                Cover <span class="text-newsBlue">CM108</span>
            </h1>
        </div>
        
        <div class="flex items-center gap-2">
            <button id="undo-btn" onclick="undo()" class="p-2 rounded-lg border border-slate-200 bg-slate-50 text-slate-500 disabled:opacity-30 active:scale-95 transition" title="ย้อนกลับ">
                <i class="ph-bold ph-arrow-u-up-left text-lg"></i>
            </button>
            <button onclick="exportImage()" class="bg-newsDark text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-1.5 active:scale-95 transition shadow-md">
                <i class="ph-bold ph-download-simple text-lg"></i>
                <span class="hidden sm:inline">บันทึกรูป</span>
                <span class="sm:hidden">บันทึก</span>
            </button>
        </div>
    </header>

    <!-- Preview Area (Fixed Top Half) -->
    <section id="preview-section" class="canvas-bg relative flex justify-center items-center shrink-0 border-b border-slate-200 z-10 transition-all duration-300" style="height: 42vh; min-height: 250px;">
        <div id="scale-container" class="shadow-2xl bg-black relative">
            <div id="capture-area" style="width: 1080px; height: 1350px; transform-origin: top left;"></div>
        </div>

        <div id="loading-overlay" class="absolute inset-0 bg-white/90 backdrop-blur-sm z-[100] flex flex-col items-center justify-center hidden">
            <div class="w-12 h-12 border-4 border-slate-200 border-t-newsBlue rounded-full animate-spin"></div>
            <p class="mt-3 font-bold text-slate-700 text-sm">กำลังบันทึกภาพ...</p>
        </div>
    </section>

    <!-- Mobile Tabs Navigation -->
    <nav class="bg-white border-b border-slate-200 flex shrink-0 shadow-sm z-20">
        <button onclick="switchTab('tab-image')" id="btn-tab-image" class="flex-1 py-3 text-sm font-bold text-slate-400 border-b-2 border-transparent transition flex items-center justify-center gap-1.5">
            <i class="ph-bold ph-image text-lg"></i> <span class="hidden sm:inline">รูปภาพ</span>
        </button>
        <button onclick="switchTab('tab-text')" id="btn-tab-text" class="flex-1 py-3 text-sm font-bold text-newsBlue border-b-2 border-newsBlue transition flex items-center justify-center gap-1.5">
            <i class="ph-bold ph-text-aa text-lg"></i> ข้อความ
        </button>
        <button onclick="switchTab('tab-global')" id="btn-tab-global" class="flex-1 py-3 text-sm font-bold text-slate-400 border-b-2 border-transparent transition flex items-center justify-center gap-1.5">
            <i class="ph-bold ph-sliders-horizontal text-lg"></i> วันที่/จัดวาง
        </button>
    </nav>

    <!-- Controls Area (Scrollable Bottom Half) -->
    <main class="flex-grow overflow-y-auto no-scrollbar bg-[#f8fafc] relative z-0 pb-20">
        
        <!-- TAB 1: IMAGE & BACKGROUND -->
        <div id="tab-image" class="tab-content p-4 md:p-6 space-y-6 max-w-2xl mx-auto">
            <div class="grid grid-cols-2 gap-3">
                <button type="button" onclick="document.getElementById('bg-upload').click()" class="flex flex-col items-center justify-center py-4 bg-blue-50 border-2 border-dashed border-blue-200 rounded-xl active:bg-blue-100 transition">
                    <i class="ph-bold ph-image-square text-newsBlue text-3xl mb-1"></i>
                    <span class="text-sm font-bold text-newsBlue">เปลี่ยนรูปข่าว</span>
                </button>
                <button type="button" onclick="document.getElementById('frame-upload').click()" class="flex flex-col items-center justify-center py-4 bg-emerald-50 border-2 border-dashed border-emerald-200 rounded-xl active:bg-emerald-100 transition">
                    <i class="ph-bold ph-frame-corners text-emerald-500 text-3xl mb-1"></i>
                    <span class="text-sm font-bold text-emerald-600">เปลี่ยนกรอบ</span>
                </button>
                <input type="file" id="bg-upload" accept="image/*" class="hidden">
                <input type="file" id="frame-upload" accept="image/png, image/webp" class="hidden">
            </div>

            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-5">
                <div class="flex items-center justify-between border-b border-slate-100 pb-2">
                    <span class="text-sm font-bold text-slate-700"><i class="ph-bold ph-arrows-out-simple mr-1"></i> ปรับตำแหน่งภาพ</span>
                    <button onclick="resetBG()" class="text-xs font-bold text-red-500 bg-red-50 px-2 py-1 rounded">รีเซ็ต</button>
                </div>

                <div class="space-y-1">
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-slate-500">ซูมภาพ <span id="bg-scale-val" class="text-newsBlue ml-1">1.0</span></label>
                    </div>
                    <input type="range" id="bg-scale" min="0.1" max="5" step="0.01" value="1">
                </div>

                <div class="space-y-1">
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-slate-500">เลื่อน ซ้าย-ขวา (X)</label>
                        <input type="number" id="bg-x-num" class="w-16 text-xs font-bold text-newsBlue bg-slate-100 rounded text-center outline-none py-1">
                    </div>
                    <input type="range" id="bg-x" min="-1000" max="1000" step="1" value="0">
                </div>

                <div class="space-y-1">
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-slate-500">เลื่อน บน-ล่าง (Y)</label>
                        <input type="number" id="bg-y-num" class="w-16 text-xs font-bold text-newsBlue bg-slate-100 rounded text-center outline-none py-1">
                    </div>
                    <input type="range" id="bg-y" min="-1000" max="1000" step="1" value="0">
                </div>
            </div>
        </div>

        <!-- TAB 2: TEXT HEADLINES (Active by default) -->
        <div id="tab-text" class="tab-content active p-4 md:p-6 space-y-4 max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-1">
                <p class="text-xs font-bold text-slate-400">แก้ไขข้อความพาดหัวด้านล่าง</p>
                <!-- Line Gap moved here for quick access if needed, but simplified -->
            </div>
            <div id="lines-container" class="space-y-4">
                <!-- Text controls injected by JS -->
            </div>
        </div>

        <!-- TAB 3: GLOBAL ALIGNMENT & DATE -->
        <div id="tab-global" class="tab-content p-4 md:p-6 space-y-5 max-w-2xl mx-auto">
            
            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-3">
                <label class="text-sm font-bold text-slate-700 flex items-center gap-1"><i class="ph-bold ph-calendar-blank"></i> วันที่ / เครดิต</label>
                <input type="text" id="date-text" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium text-center focus:bg-white focus:ring-2 focus:ring-newsBlue outline-none transition">
            </div>

            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-5">
                <div class="flex items-center justify-between border-b border-slate-100 pb-2">
                    <span class="text-sm font-bold text-slate-700"><i class="ph-bold ph-layout mr-1"></i> จัดตำแหน่งรวม</span>
                </div>

                <div class="space-y-1 pt-2">
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-slate-500">ระยะห่างบรรทัด (ช่องไฟ)</label>
                        <input type="number" id="line-gap" value="8" class="w-16 bg-slate-100 text-center text-xs font-bold outline-none text-newsBlue py-1 rounded">
                    </div>
                    <!-- Added a slider for gap for easier mobile use -->
                    <input type="range" id="line-gap-slider" min="0" max="50" step="1" value="8" class="w-full">
                </div>

                <div class="space-y-1">
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-bold text-slate-500">เลื่อนกลุ่มข้อความ ขึ้น-ลง</label>
                        <input type="number" id="text-y-num" value="-10" class="w-16 bg-slate-100 text-center text-xs font-bold outline-none text-blue-600 py-1 rounded">
                    </div>
                    <input type="range" id="text-y" min="-800" max="800" step="1" value="-10" class="w-full accent-blue-600">
                </div>
            </div>

            <button type="button" onclick="resetTextGlobal()" class="w-full py-3 mt-4 text-sm font-bold text-red-500 bg-red-50 hover:bg-red-100 border border-red-200 rounded-xl transition">
                <i class="ph-bold ph-arrow-counter-clockwise mr-1"></i> รีเซ็ตข้อความและวันที่ทั้งหมด
            </button>
            
        </div>

    </main>

    <script>
        // --- Core Application Logic ---
        const defaultFrame = "https://wsrv.nl/?url=blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiOOtphYnEgsG_Q_5Ht_nM8h4hBJkTlJ0HvXwVOlixbfIkYC4y4NTIxcfl58PvyUi9Tj9azFCGGRCK3ysLAyX3yzXVHRmfbtsau733we6uQ3DE6csoMtWBMG2TNS2i-8aOtvIKTpzkCIyh3avLpViH74sW5SnwEZCkkToZeB4Q6VO-cxHafdputo5SmSxE/s16000/%E0%B8%81%E0%B8%A3%E0%B8%AD%E0%B8%9A%E0%B9%80%E0%B8%9B%E0%B8%A5%E0%B9%88%E0%B8%B2.png&output=png";

        function getThaiToday() {
            const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            const d = new Date();
            return `- ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() + 543} -`;
        }

        let state = {
            lines: [
                { text: 'ประกันสังคม คว้ารางวัล', color: '#4bfafc', bgColor: 'transparent', size: 97, align: 'center', shadow: true, shadowOffset: 3, stroke: 6, yOffset: 25 },
                { text: 'สุดยอดหน่วยงานภาครัฐ', color: '#ffffff', bgColor: '#0bc8fa', size: 91, align: 'center', shadow: true, shadowOffset: 3, stroke: 6, yOffset: 0 },
                { text: 'จากเวที LINE THAILAND AWARDS 2025', color: '#ff9012', bgColor: 'transparent', size: 53, align: 'center', shadow: true, shadowOffset: 0, stroke: 0, yOffset: 0 }
            ],
            bg: { src: 'https://images.unsplash.com/photo-1555848962-6e79363ec58f?q=80&w=1080&auto=format&fit=crop', scale: 1, x: 0, y: 0, blur: false },
            frame: { src: defaultFrame },
            textPos: { y: -10 },
            gap: 8,
            date: { text: getThaiToday() }
        };

        let historyStack = [];
        const defaultColors = [
            { hex: '#4bfafc' }, { hex: '#0bc8fa' }, { hex: '#ffffff' }, 
            { hex: '#ff9012' }, { hex: '#f59e0b' }, { hex: '#000000' }
        ];

        // --- Tab Management ---
        function switchTab(tabId) {
            // Update buttons
            ['btn-tab-image', 'btn-tab-text', 'btn-tab-global'].forEach(id => {
                const btn = document.getElementById(id);
                btn.classList.remove('text-newsBlue', 'border-newsBlue');
                btn.classList.add('text-slate-400', 'border-transparent');
            });
            const activeBtn = document.getElementById(`btn-${tabId}`);
            activeBtn.classList.remove('text-slate-400', 'border-transparent');
            activeBtn.classList.add('text-newsBlue', 'border-newsBlue');

            // Update content
            ['tab-image', 'tab-text', 'tab-global'].forEach(id => {
                document.getElementById(id).classList.remove('active');
            });
            document.getElementById(tabId).classList.add('active');

            // Resize handle on tab switch just in case layout jumps
            setTimeout(handleResize, 50);
        }

        function toggleAdvancedSettings(idx) {
            const el = document.getElementById(`adv-settings-${idx}`);
            const icon = document.getElementById(`adv-icon-${idx}`);
            if (el.classList.contains('open')) {
                el.classList.remove('open');
                icon.style.transform = "rotate(0deg)";
            } else {
                el.classList.add('open');
                icon.style.transform = "rotate(180deg)";
            }
        }

        // --- Core Functions ---
        function saveToHistory() {
            historyStack.push(JSON.parse(JSON.stringify(state)));
            if (historyStack.length > 30) historyStack.shift();
            updateUndoButton();
        }

        function undo() {
            if (historyStack.length === 0) return;
            state = historyStack.pop();
            renderAll(); syncInputs(); renderControls(); updateUndoButton();
        }

        function updateUndoButton() {
            const btn = document.getElementById('undo-btn');
            if (btn) btn.disabled = historyStack.length === 0;
        }

        function updateLine(idx, key, val) {
            state.lines[idx][key] = val;
            
            // Sync visible inputs immediately without full re-render of controls
            if (['size', 'yOffset', 'stroke', 'shadowOffset'].includes(key)) {
                const rangeInput = document.getElementById(`range-${key}-${idx}`);
                const numInput = document.getElementById(`num-${key}-${idx}`);
                if (rangeInput && rangeInput.value != val) rangeInput.value = val;
                if (numInput && numInput.value != val) numInput.value = val;
            }
            
            renderAll();
            
            // Only re-render UI components if it's a structural/visual button change
            if (['align', 'shadow', 'color', 'bgColor'].includes(key)) {
                renderControls(); 
            }
        }

        function resetBG() {
            saveToHistory();
            state.bg.scale = 1; state.bg.x = 0; state.bg.y = 0;
            syncInputs(); renderAll();
        }

        function resetLine(idx) {
            saveToHistory();
            const defConfigs = [
                { color: '#4bfafc', bgColor: 'transparent', size: 97, align: 'center', shadow: true, shadowOffset: 3, stroke: 6, yOffset: 25 },
                { color: '#ffffff', bgColor: '#0bc8fa', size: 91, align: 'center', shadow: true, shadowOffset: 3, stroke: 6, yOffset: 0 },
                { color: '#ff9012', bgColor: 'transparent', size: 53, align: 'center', shadow: true, shadowOffset: 0, stroke: 0, yOffset: 0 }
            ];
            const currentText = state.lines[idx].text;
            state.lines[idx] = { ...defConfigs[idx], text: currentText };
            renderAll(); renderControls();
        }

        function resetTextGlobal() {
            saveToHistory();
            state.textPos.y = -10; state.gap = 8; state.date.text = getThaiToday();
            syncInputs(); renderAll();
        }

        function generateArtworkHTML(isExport = false, exportUnifiedBgSrc = null) {
            let linesHTML = '';
            
            state.lines.forEach((line, idx) => {
                if (!line.text.trim()) return;
                const padding = line.bgColor !== 'transparent' ? 'padding: 22px 30px 16px 30px;' : 'padding: 0;';
                const radius = line.bgColor !== 'transparent' ? 'border-radius: 16px;' : '';
                
                let justify = line.align === 'center' ? 'center' : (line.align === 'right' ? 'flex-end' : 'flex-start');
                let textAlign = line.align === 'center' ? 'center' : (line.align === 'right' ? 'right' : 'left');

                let layersHTML = '';
                let zIdx = 1;

                // Layer 1: เงาซ้อน (Drop Shadow Extrusion) สร้างมิติความลึก
                if (line.shadow && line.shadowOffset > 0) {
                    for (let d = line.shadowOffset; d >= 0.5; d -= 0.5) {
                        let strokeStyle = line.stroke > 0 ? `-webkit-text-stroke: ${line.stroke * 2}px black;` : '';
                        layersHTML += `<span style="grid-column: 1; grid-row: 1; color: black; ${strokeStyle} font-size: ${line.size}px; font-weight: 700; line-height: 1.15; display: block; white-space: pre-wrap; text-align: ${textAlign}; position: relative; left: ${d}px; top: ${d}px; z-index: ${zIdx++}; width: 100%;">${line.text}</span>`;
                    }
                }

                // Layer 2: ขอบดำหลัก (Main Stroke Base) ใช้ Vector Stroke แทนเงา เพื่อความเนียน 100%
                if (line.stroke > 0) {
                    layersHTML += `<span style="grid-column: 1; grid-row: 1; color: black; -webkit-text-stroke: ${line.stroke * 2}px black; font-size: ${line.size}px; font-weight: 700; line-height: 1.15; display: block; white-space: pre-wrap; text-align: ${textAlign}; position: relative; z-index: ${zIdx++}; width: 100%;">${line.text}</span>`;
                }

                // Layer 3: ข้อความสีเนื้อใน (Top Fill Layer)
                // แก้ปัญหาเส้นดำทะลุ: เลิกใช้ text-stroke ในเลเยอร์บนสุด แล้วใช้ text-shadow เกลี่ยรอยต่อสีแทน
                let fixAntialias = line.stroke > 0 ? `text-shadow: -1.5px -1.5px 0 ${line.color}, 1.5px -1.5px 0 ${line.color}, -1.5px 1.5px 0 ${line.color}, 1.5px 1.5px 0 ${line.color};` : 'text-shadow: none;';
                layersHTML += `<span style="grid-column: 1; grid-row: 1; color: ${line.color}; font-size: ${line.size}px; font-weight: 700; line-height: 1.15; display: block; white-space: pre-wrap; text-align: ${textAlign}; position: relative; z-index: ${zIdx++}; ${fixAntialias} width: 100%;">${line.text}</span>`;

                linesHTML += `
                    <div style="display: flex; justify-content: ${justify}; width: 100%; transform: translateY(${line.yOffset}px);">
                        <div class="highlight-box-export-fix" style="background-color: ${line.bgColor}; ${radius} ${padding} box-sizing: border-box;">
                            <div class="text-layer-wrapper" style="display: grid; width: 100%;">
                                ${layersHTML}
                            </div>
                        </div>
                    </div>
                `;
            });

            const textGroupHTML = `
                <div id="headlines-export-wrapper" style="position: absolute; bottom: 280px; left: 0; width: 1080px; display: flex; flex-direction: column; align-items: center; z-index: 20; transform: translateY(${state.textPos.y}px);">
                    <div style="display: flex; flex-direction: column; width: 1040px; gap: ${parseInt(state.gap) + 20}px;">
                        ${linesHTML}
                    </div>
                    <div id="date-container-export" style="margin-top: 15px; display: flex; justify-content: center;">
                        <span id="date-text-export-span" style="color: white; font-size: 34px; font-weight: 600; text-shadow: 0px 2px 5px rgba(0,0,0,0.8); line-height: 1.2;">${state.date.text}</span>
                    </div>
                </div>
            `;

            const frameLayerHTML = `<img src="${state.frame.src}" style="position: absolute; top: 0; left: 0; width: 1080px; height: 1350px; z-index: 30; pointer-events: none; object-fit: contain;" crossorigin="anonymous">`;
            const bgTransform = `transform: translate(${state.bg.x}px, ${state.bg.y}px) scale(${state.bg.scale});`;
            const bgImageHTML = `<img src="${state.bg.src}" crossorigin="anonymous" style="width: 1080px; height: auto; display: block; image-rendering: -webkit-optimize-contrast; ${bgTransform} border: none !important; outline: none !important;">`;
            const fgContainerHTML = `<div style="position: absolute; top: 0; left: 0; width: 1080px; height: 1350px; z-index: 2; display: flex; align-items: flex-start; justify-content: center; padding-top: 0px;">${bgImageHTML}</div>`;

            const hasLine3 = state.lines[2] && state.lines[2].text.trim() !== '';
            const gradientHeight = hasLine3 ? 740 : 640;

            return `
                <div style="width: 1080px; height: 1350px; position: relative; overflow: hidden; background-color: #000; box-sizing: border-box;">
                    ${fgContainerHTML}
                    <div style="position: absolute; bottom: 0px; left: 0px; right: 0px; height: ${gradientHeight}px; background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 80%, rgba(0,0,0,0.8) 88%, rgba(0,0,0,0.4) 94%, rgba(0,0,0,0.1) 98%, transparent 100%); z-index: 10; pointer-events: none;"></div>
                    ${textGroupHTML}
                    ${frameLayerHTML}
                </div>
            `;
        }

        let renderAnimationFrame = null;

        function renderAll() {
            if (renderAnimationFrame) cancelAnimationFrame(renderAnimationFrame);
            
            renderAnimationFrame = requestAnimationFrame(() => {
                const area = document.getElementById('capture-area');
                if (area) {
                    area.innerHTML = generateArtworkHTML(false, null);
                    
                    const hasLine3 = state.lines[2] && state.lines[2].text.trim() !== '';
                    const highlights = area.querySelectorAll('.highlight-box-export-fix');
                    
                    highlights.forEach((box, index) => {
                        let previewParentTop = 0;
                        if (!hasLine3 && (index === 0 || index === 1)) previewParentTop = -5;
                        
                        if (previewParentTop !== 0) {
                            box.parentElement.style.position = 'relative';
                            box.parentElement.style.top = `${previewParentTop}px`;
                        }

                        if (box.style.backgroundColor !== 'transparent' && box.style.backgroundColor !== 'rgba(0, 0, 0, 0)') {
                            let offset = 5;
                            box.style.position = 'relative'; box.style.top = `${offset}px`;
                            const textWrapper = box.querySelector('.text-layer-wrapper');
                            if (textWrapper) { textWrapper.style.position = 'relative'; textWrapper.style.top = `${-offset}px`; }
                        }
                    });
                }
                const scaleLbl = document.getElementById('bg-scale-val');
                if (scaleLbl) scaleLbl.innerText = parseFloat(state.bg.scale).toFixed(2);
            });
        }

        // --- Render Mobile-Friendly Controls ---
        function renderControls() {
            const container = document.getElementById('lines-container');
            // Check which settings are currently open so we can restore them
            let openSettings = [];
            for(let i=0; i<3; i++) {
                const el = document.getElementById(`adv-settings-${i}`);
                if(el && el.classList.contains('open')) openSettings.push(i);
            }

            container.innerHTML = '';
            
            state.lines.forEach((line, idx) => {
                const isOpen = openSettings.includes(idx);
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden";
                
                // MAIN UI (Always visible)
                const mainUI = `
                    <div class="p-4 border-b border-slate-100">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs font-bold text-slate-400 bg-slate-100 px-2 py-0.5 rounded uppercase">บรรทัด ${idx+1}</span>
                            <div class="flex gap-1">
                                <button onclick="saveToHistory(); updateLine(${idx}, 'align', 'left')" class="p-1.5 rounded-md ${line.align === 'left' ? 'bg-newsBlue text-white' : 'text-slate-400 hover:bg-slate-100'} transition"><i class="ph-bold ph-text-align-left"></i></button>
                                <button onclick="saveToHistory(); updateLine(${idx}, 'align', 'center')" class="p-1.5 rounded-md ${line.align === 'center' ? 'bg-newsBlue text-white' : 'text-slate-400 hover:bg-slate-100'} transition"><i class="ph-bold ph-text-align-center"></i></button>
                                <div class="w-px h-5 bg-slate-200 mx-1 self-center"></div>
                                <button onclick="resetLine(${idx})" class="p-1.5 text-slate-300 hover:text-red-500 transition"><i class="ph-bold ph-arrow-counter-clockwise"></i></button>
                            </div>
                        </div>
                        
                        <!-- Text Input -->
                        <textarea onfocus="saveToHistory()" oninput="updateLine(${idx}, 'text', this.value)" class="w-full px-3 py-3 bg-slate-50 border border-slate-200 rounded-lg text-sm font-bold focus:bg-white focus:ring-2 focus:ring-newsBlue outline-none transition-all resize-none font-prompt mb-4 leading-relaxed" rows="2" placeholder="พิมพ์ข้อความบรรทัดที่ ${idx+1} ...">${line.text}</textarea>
                        
                        <!-- Size Slider (Most used) -->
                        <div class="mb-4">
                            <div class="flex justify-between items-center mb-1">
                                <label class="text-xs font-bold text-slate-500">ขนาดอักษร</label>
                                <span class="text-xs font-bold text-newsBlue">${line.size}</span>
                            </div>
                            <input type="range" id="range-size-${idx}" min="30" max="250" value="${line.size}" onmousedown="saveToHistory()" ontouchstart="saveToHistory()" oninput="updateLine(${idx}, 'size', parseInt(this.value))" class="w-full">
                        </div>
                    </div>
                `;

                // ADVANCED SETTINGS (Hidden by toggle)
                const advUI = `
                    <button onclick="toggleAdvancedSettings(${idx})" class="w-full py-2.5 bg-slate-50 hover:bg-slate-100 flex items-center justify-center gap-1 text-xs font-bold text-slate-500 transition">
                        <i class="ph-bold ph-gear"></i> ตั้งค่าเพิ่มเติม (สี, ไฮไลท์, เงา, ขอบ, เลื่อน)
                        <i id="adv-icon-${idx}" class="ph-bold ph-caret-down transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}"></i>
                    </button>
                    
                    <div id="adv-settings-${idx}" class="advanced-settings bg-slate-50 p-4 border-t border-slate-200 space-y-4 ${isOpen ? 'open' : ''}">
                        
                        <!-- Colors & Highlights Moved Here -->
                        <div class="flex flex-col sm:flex-row gap-3 justify-between items-start sm:items-center bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                            <div class="flex gap-1.5 items-center w-full sm:w-auto">
                                <span class="text-[10px] font-bold text-slate-500 uppercase mr-1 w-10">สีอักษร:</span>
                                ${defaultColors.map(c => `<button onclick="saveToHistory(); updateLine(${idx}, 'color', '${c.hex}')" class="w-6 h-6 rounded-full shadow-sm border border-slate-200" style="background-color: ${c.hex}; ${line.color === c.hex ? 'ring-2 ring-newsBlue ring-offset-2' : ''}"></button>`).join('')}
                            </div>
                            <div class="flex gap-1.5 items-center w-full sm:w-auto pt-2 sm:pt-0 border-t border-slate-200 sm:border-0">
                                <span class="text-[10px] font-bold text-slate-500 uppercase mr-1 w-10 sm:w-auto">ไฮไลท์:</span>
                                <button onclick="saveToHistory(); updateLine(${idx}, 'bgColor', 'transparent')" class="w-6 h-6 rounded-full border border-slate-300 relative overflow-hidden" title="ไม่มี"><div class="absolute inset-0 bg-white"></div><div class="absolute inset-0 bg-red-500 w-[1px] rotate-45 left-1/2"></div></button>
                                <button onclick="saveToHistory(); updateLine(${idx}, 'bgColor', '#0bc8fa')" class="w-6 h-6 rounded-full bg-[#0bc8fa] shadow-sm ${line.bgColor === '#0bc8fa' ? 'ring-2 ring-newsBlue ring-offset-2' : ''}"></button>
                                <button onclick="saveToHistory(); updateLine(${idx}, 'bgColor', '#ffffff')" class="w-6 h-6 rounded-full bg-white shadow-sm border border-slate-200 ${line.bgColor === '#ffffff' ? 'ring-2 ring-newsBlue ring-offset-2' : ''}"></button>
                            </div>
                        </div>

                        <div class="space-y-1">
                            <div class="flex justify-between items-center">
                                <label class="text-xs font-bold text-slate-500">ขยับ ขึ้น-ลง (Y)</label>
                                <input type="number" id="num-yOffset-${idx}" value="${line.yOffset}" onfocus="saveToHistory()" oninput="updateLine(${idx}, 'yOffset', parseInt(this.value) || 0)" class="w-12 text-xs font-bold text-emerald-600 bg-white rounded text-center outline-none py-1 border border-slate-200">
                            </div>
                            <input type="range" id="range-yOffset-${idx}" min="-150" max="150" value="${line.yOffset}" onmousedown="saveToHistory()" ontouchstart="saveToHistory()" oninput="updateLine(${idx}, 'yOffset', parseInt(this.value))" class="accent-emerald-500">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <div class="flex justify-between items-center"><label class="text-xs font-bold text-slate-500">ความหนาขอบ</label></div>
                                <input type="range" id="range-stroke-${idx}" min="0" max="15" value="${line.stroke}" onmousedown="saveToHistory()" ontouchstart="saveToHistory()" oninput="updateLine(${idx}, 'stroke', parseInt(this.value))" class="accent-black">
                            </div>
                            <div class="space-y-1">
                                <div class="flex justify-between items-center"><label class="text-xs font-bold text-slate-500">ระยะเงา</label></div>
                                <input type="range" id="range-shadowOffset-${idx}" min="0" max="20" value="${line.shadowOffset}" onmousedown="saveToHistory()" ontouchstart="saveToHistory()" oninput="updateLine(${idx}, 'shadowOffset', parseInt(this.value))" class="accent-gray-600">
                            </div>
                        </div>
                    </div>
                `;

                card.innerHTML = mainUI + advUI;
                container.appendChild(card);
            });
        }

        function syncInputs() {
            document.getElementById('bg-scale').value = state.bg.scale;
            document.getElementById('bg-x').value = state.bg.x;
            document.getElementById('bg-y').value = state.bg.y;
            document.getElementById('bg-x-num').value = state.bg.x;
            document.getElementById('bg-y-num').value = state.bg.y;
            document.getElementById('text-y').value = state.textPos.y;
            document.getElementById('text-y-num').value = state.textPos.y;
            document.getElementById('line-gap').value = state.gap;
            document.getElementById('line-gap-slider').value = state.gap;
            document.getElementById('date-text').value = state.date.text;
        }

        function handleResize() {
            const wrapper = document.getElementById('preview-section');
            const container = document.getElementById('scale-container');
            const artwork = document.getElementById('capture-area');
            
            // Calculate scale based on the upper half wrapper size
            const scaleX = (wrapper.clientWidth - 32) / 1080;
            const scaleY = (wrapper.clientHeight - 32) / 1350;
            const scale = Math.min(scaleX, scaleY, 1);
            
            artwork.style.transform = `scale(${scale})`;
            container.style.width = `${1080 * scale}px`;
            container.style.height = `${1350 * scale}px`;
        }

        async function exportImage() {
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('hidden');
            try {
                const exportContainer = document.createElement('div');
                exportContainer.style.position = 'fixed'; exportContainer.style.left = '-9999px'; exportContainer.style.top = '0';
                exportContainer.style.width = '1080px'; exportContainer.style.height = '1350px';
                exportContainer.innerHTML = generateArtworkHTML(true, null);
                
                const hasLine3 = state.lines[2] && state.lines[2].text.trim() !== '';

                const highlightBoxes = exportContainer.querySelectorAll('.highlight-box-export-fix');
                highlightBoxes.forEach((box, index) => {
                    let parentTop = -15; 
                    if (index === 0) {
                        parentTop = -22; 
                        if (!hasLine3) parentTop -= 15; 
                    } else if (index === 1) {
                        parentTop = -15; 
                        if (!hasLine3) parentTop -= 15; 
                    } else if (index === 2) {
                        parentTop = -2;  
                    }
                    
                    box.parentElement.style.position = 'relative'; 
                    box.parentElement.style.top = parentTop + 'px';

                    if (box.style.backgroundColor !== 'transparent' && box.style.backgroundColor !== 'rgba(0, 0, 0, 0)') {
                        let bTop = 50, tTop = -50;
                        if (index === 1) { bTop = 45; tTop = -50; } 
                        else if (index === 2) { bTop = 40; tTop = -40; }
                        box.style.position = 'relative'; box.style.top = bTop + 'px';
                        const textWrapper = box.querySelector('.text-layer-wrapper');
                        if (textWrapper) { textWrapper.style.position = 'relative'; textWrapper.style.top = tTop + 'px'; }
                    }
                });

                const exportDateContainer = exportContainer.querySelector('#date-container-export');
                const exportDateSpan = exportContainer.querySelector('#date-text-export-span');
                if (exportDateContainer && exportDateSpan) {
                    exportDateContainer.style.marginTop = '0px'; exportDateContainer.style.position = 'relative';
                    exportDateContainer.style.top = '15px'; exportDateSpan.style.fontWeight = '600';
                    exportDateSpan.style.fontSize = '34px';
                }

                const exportHeadlinesWrapper = exportContainer.querySelector('#headlines-export-wrapper');
                if (exportHeadlinesWrapper) exportHeadlinesWrapper.style.bottom = '315px'; 

                document.body.appendChild(exportContainer);
                await new Promise(r => setTimeout(r, 800)); // give DOM time to render
                const canvas = await html2canvas(exportContainer.firstElementChild, { scale: 1, useCORS: true, allowTaint: true, backgroundColor: '#000000', width: 1080, height: 1350 });
                document.body.removeChild(exportContainer);
                const link = document.createElement('a');
                link.download = `CM108_Cover_${Date.now()}.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.95); link.click();
            } catch (err) { alert("เกิดข้อผิดพลาดในการบันทึกรูปภาพ: " + err); console.error(err); } finally { overlay.classList.add('hidden'); }
        }

        // --- Event Listeners Setup ---
        window.onload = () => {
            renderControls(); renderAll(); syncInputs(); 
            setTimeout(handleResize, 100); // Delay slightly for accurate mobile viewport
            window.addEventListener('resize', handleResize);
            
            // File Uploads
            document.getElementById('bg-upload').addEventListener('change', function(e) {
                if (e.target.files && e.target.files[0]) {
                    const url = URL.createObjectURL(e.target.files[0]);
                    const img = new Image();
                    img.onload = function() {
                        saveToHistory();
                        state.bg.src = url;
                        const heightAtWidth1080 = 1080 * (img.height / img.width);
                        state.bg.scale = heightAtWidth1080 < 920 ? (920 / heightAtWidth1080).toFixed(2) : 1.0;
                        state.bg.x = 0; state.bg.y = 0;
                        renderAll(); syncInputs();
                        switchTab('tab-image'); // Switch to image tab so they can adjust
                    };
                    img.src = url;
                }
            });

            document.getElementById('frame-upload').addEventListener('change', function(e) { 
                if (e.target.files && e.target.files[0]) { 
                    saveToHistory(); state.frame.src = URL.createObjectURL(e.target.files[0]); renderAll(); 
                } 
            });
            
            // Input Handlers
            const bindInputs = () => {
                ['bg-scale', 'bg-x', 'bg-y', 'bg-x-num', 'bg-y-num', 'text-y', 'text-y-num', 'line-gap', 'line-gap-slider'].forEach(id => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    
                    if (el.type === 'range') {
                        el.addEventListener('mousedown', saveToHistory);
                        el.addEventListener('touchstart', saveToHistory, {passive: true});
                    } else if (el.type === 'number' || el.type === 'text') {
                        el.addEventListener('focus', saveToHistory);
                    }

                    el.oninput = (e) => {
                        let val = e.target.value;
                        if (id === 'bg-scale') state.bg.scale = val;
                        else if (id === 'bg-x' || id === 'bg-x-num') { state.bg.x = parseInt(val) || 0; document.getElementById('bg-x').value = state.bg.x; document.getElementById('bg-x-num').value = state.bg.x; }
                        else if (id === 'bg-y' || id === 'bg-y-num') { state.bg.y = parseInt(val) || 0; document.getElementById('bg-y').value = state.bg.y; document.getElementById('bg-y-num').value = state.bg.y; }
                        else if (id === 'text-y' || id === 'text-y-num') { state.textPos.y = val; document.getElementById('text-y').value = val; document.getElementById('text-y-num').value = val; }
                        else if (id === 'line-gap' || id === 'line-gap-slider') { state.gap = val; document.getElementById('line-gap').value = val; document.getElementById('line-gap-slider').value = val;}
                        renderAll();
                    };
                });
            }
            bindInputs();

            const dateTextEl = document.getElementById('date-text');
            if (dateTextEl) {
                dateTextEl.addEventListener('focus', saveToHistory);
                dateTextEl.oninput = (e) => { state.date.text = e.target.value; renderAll(); };
            }
            
            window.addEventListener('keydown', (e) => { if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); } });
        };
    </script>
</body>
</html>
